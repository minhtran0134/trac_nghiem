<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hệ Thống Ôn Thi Luật Đấu Thầu 2023</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0d0f; --bg2:#131316; --bg3:#1a1a1f; --bg4:#222228;
  --border:#2a2a32; --border2:#38383f; --text:#f0f0f4; --text2:#9898a8; --text3:#5a5a68;
  --accent:#7c6fff; --accent2:#5b4ff0; --accent-glow:rgba(124,111,255,0.18);
  --green:#2dd98e; --green-bg:rgba(45,217,142,0.1);
  --red:#ff5f5f; --red-bg:rgba(255,95,95,0.1);
  --radius:14px; --radius-sm:10px;
}
[data-theme="light"] {
  --bg:#f4f4f9; --bg2:#ffffff; --bg3:#f0f0f5; --bg4:#e8e8f0;
  --border:#d1d1d6; --border2:#c7c7cc; --text:#1c1c1e; --text2:#636366; --text3:#8e8e93;
  --accent:#5856d6; --accent2:#4544b3; --accent-glow:rgba(88,86,214,0.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;transition:0.3s;}
.app{max-width:720px;margin:0 auto;padding:1.5rem 1rem}
.screen{display:none}.screen.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.display{font-family:'Syne',sans-serif;font-size:24px;font-weight:700}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);transition:0.2s}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.opt-btn{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;cursor:pointer;background:var(--bg3)}
.opt-btn.selected{border-color:var(--accent);background:var(--accent-glow)}
.opt-circle{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700}
.prog-bar{height:4px;background:var(--bg4);border-radius:2px;margin:1rem 0;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);transition:width 0.3s}
.nav-dots{display:grid;grid-template-columns: repeat(auto-fill, minmax(35px, 1fr));gap:6px;margin-top:1.5rem}
.nav-dot{height:35px;border-radius:8px;border:1px solid var(--border);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg2)}
.nav-dot.answered{background:var(--accent);color:#fff}
.nav-dot.current{border:2px solid var(--accent);color:var(--accent)}
.review-item{padding:15px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);margin-bottom:12px;border-left:4px solid transparent}
.status-msg {font-size: 20px; font-weight: 800; padding: 10px; border-radius: 8px; margin: 15px 0; text-transform: uppercase;}
</style>
</head>
<body>
<div class="app">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
    <div style="font-weight:700; color:var(--accent); font-family:'Syne'">QUIZ SYSTEM</div>
    <button class="btn btn-sm" onclick="toggleTheme()" id="theme-btn">🌙 Chế độ tối</button>
  </div>

  <div id="screen-home" class="screen active">
    <div class="card">
      <div class="display">Ôn Tập Luật Đấu Thầu 2023</div>
      <p style="color:var(--text2); margin-top:10px">Ngân hàng đề thi: <b>390 câu (Đã nạp đủ)</b>.</p>
      <p style="color:var(--text2)">Hệ thống bốc ngẫu nhiên <b>70 câu</b> mỗi lượt làm bài.</p>
      <div style="margin-top:20px; display:flex; gap:15px; font-size:13px">
        <span>⏱ 60 Phút</span>
        <span>📝 70 Câu hỏi</span>
        <span>✅ Đỗ: ≥ 50% câu đúng</span>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="startNewQuiz()">Bắt đầu thi ngay</button>
  </div>

  <div id="screen-quiz" class="screen">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <span id="q-meta" style="font-size:13px; color:var(--text2)"></span>
        <span id="timer-text" style="font-weight:700; color:var(--accent)">60:00</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
      <div id="q-text" style="font-size:16px; font-weight:500; margin:1.2rem 0; min-height:50px"></div>
      <div id="options-wrap"></div>
      <div style="display:flex; gap:10px; margin-top:15px">
        <button class="btn" style="flex:1" onclick="navigate(-1)">Trước</button>
        <button class="btn btn-primary" style="flex:1" onclick="navigate(1)">Sau</button>
      </div>
      <div class="nav-dots" id="nav-dots"></div>
    </div>
    <button class="btn btn-primary" style="width:100%; background:var(--green); border-color:var(--green)" onclick="submitQuiz()">Nộp bài</button>
  </div>

  <div id="screen-result" class="screen">
    <div class="card" style="text-align:center">
      <div id="result-status" class="status-msg"></div>
      <div class="display" id="res-pct" style="font-size:48px; color:var(--accent)">0%</div>
      <div id="res-stats" style="font-weight:600; margin-top:10px">
        Đúng: <span id="res-correct" style="color:var(--green)"></span> | 
        Sai: <span id="res-wrong" style="color:var(--red)"></span>
      </div>
    </div>
    <div id="review-wrap"></div>
    <button class="btn btn-primary" style="width:100%" onclick="location.reload()">Thoát / Làm lại</button>
  </div>
</div>

<script>
// Tổng hợp 390 câu từ các nguồn tài liệu 
const masterBank = [
  { id: 1, text: "Trường hợp nào sau đây bắt buộc phải lựa chọn nhà thầu theo quy định tại Luật Đấu thầu?", options: ["Gói thầu thuộc dự án sử dụng vốn ngân sách nhà nước của cơ quan nhà nước", "Lựa chọn nhà thầu của doanh nghiệp nhà nước không sử dụng vốn ngân sách nhà nước", "Lựa chọn nhà thầu của đơn vị sự nghiệp công lập tự bảo đảm chi thường xuyên không sử dụng ngân sách nhà nước", "Việc thuê, mua, thuê mua nhà, trụ sở, tài sản gắn liền với đất"], correct: 0 },
  { id: 2, text: "Chọn phương án đúng về phạm vi điều chỉnh của Luật Đấu thầu?", options: ["Quy định về quản lý nhà nước đối với hoạt động đấu thầu", "Quy định về thẩm quyền và trách nhiệm của các cơ quan, tổ chức, cá nhân", "Quy định về hoạt động lựa chọn nhà thầu thực hiện gói thầu, nhà đầu tư dự án", "Tất cả phương án trên đều đúng"], correct: 3 },
  { id: 3, text: "Trường hợp nào sau đây không thuộc đối tượng áp dụng của Luật Đấu thầu?", options: ["Gói thầu mua thuốc ngân sách bệnh viện công lập", "Gói thầu xây dựng đường giao thông sử dụng vốn đầu tư công", "Gói thầu trang thiết bị vốn nhà nước của Văn phòng UBND", "Hoạt động mua phần mềm của hộ kinh doanh cá thể"], correct: 3 },
  { id: 4, text: "Trong đấu thầu quốc tế, quy định về đồng tiền dự thầu như thế nào?", options: ["HSMT quy định tối đa 03 loại tiền tệ, có VNĐ thì quy đổi về VNĐ", "Nhà thầu không được chào thầu bằng đồng tiền nước ngoài", "Chi phí trong và ngoài nước đều chào thầu bằng VNĐ", "Nhà thầu chỉ được chào thầu bằng 01 loại tiền tệ bất kỳ"], correct: 0 },
  { id: 5, text: "Đơn vị sự nghiệp công lập tự bảo đảm một phần chi thường xuyên tự quyết định chọn thầu khi nào?", options: ["Sử dụng nguồn thu hợp pháp không sử dụng ngân sách nhà nước", "Gói thầu sử dụng nguồn vốn vay ODA hoặc vay ưu đãi nước ngoài", "Gói thầu thuộc dự án đầu tư sử dụng ngân sách nhà nước", "Khi nhận tài trợ quốc tế yêu cầu không thực hiện theo Luật Đấu thầu"], correct: 0 },
  { id: 6, text: "Trong đấu thầu, quy định về ngôn ngữ sử dụng như thế nào?", options: ["Đấu thầu quốc tế chỉ sử dụng tiếng Anh", "Đấu thầu quốc tế bắt buộc dùng cả tiếng Việt và tiếng Anh", "Trong nước dùng tiếng Anh, quốc tế dùng tiếng Việt", "Trong nước dùng tiếng Việt, quốc tế dùng tiếng Anh hoặc cả Việt và Anh"], correct: 3 },
  { id: 7, text: "Cơ quan, tổ chức, doanh nghiệp được tự quyết định lựa chọn nhà thầu phải bảo đảm nguyên tắc nào?", options: ["Công khai, minh bạch, hiệu quả kinh tế và trách nhiệm giải trình", "Tiết kiệm, hiệu quả và trách nhiệm giải trình", "Công khai, minh bạch, hiệu quả và trách nhiệm giải trình", "Cạnh tranh, công bằng, minh bạch và hiệu quả kinh tế"], correct: 2 },
  { id: 8, text: "Dịch vụ phi tư vấn bao gồm nội dung nào sau đây?", options: ["Logistics, bảo hiểm, quảng cáo, vệ sinh", "Khảo sát, thiết kế, lập báo cáo nghiên cứu khả thi", "Cung cấp thiết bị có bao gồm dịch vụ lắp đặt", "Xây dựng phần mềm nội bộ"], correct: 0 },
  { id: 9, text: "Khi nhà thầu vi phạm quy định về đấu thầu, nhà thầu có thể phải chịu hình thức xử lý gì?", options: ["Cấm tham dự thầu, xử lý hình sự và xử phạt hành chính", "Chỉ bị cấm tham dự thầu trong một khoảng thời gian", "Chỉ bị xử phạt hành chính tương ứng từng hành vi", "Chỉ bị cảnh cáo và nhắc nhở trên hệ thống"], correct: 0 },
  { id: 10, text: "Hành vi nào dưới đây được xem là thông thầu?", options: ["Dàn xếp, thỏa thuận để một hoặc các bên rút hồ sơ nhằm giúp bên khác trúng thầu", "Cung cấp thông tin sai lệch về năng lực tài chính trong hồ sơ", "Nhà thầu tư vấn giám sát đồng thời tư vấn kiểm định cho cùng gói thầu", "Cố tình khiếu nại sai sự thật để cản trở hoạt động đấu thầu"], correct: 0 },
  { id: 11, text: "Trường hợp nào được coi là thông thầu?", options: ["Dùng ảnh hưởng cá nhân tác động vào việc lập HSMT", "Dàn xếp để thầu phụ thực hiện khối lượng trên 30%", "Cố ý cung cấp thông tin sai lệch làm sai lệch kết quả", "Thỏa thuận rút hồ sơ để một bên trúng thầu"], correct: 3 },
  { id: 12, text: "Đâu là hành vi gian lận trong đấu thầu?", options: ["Thỏa thuận về giá dự thầu", "Làm giả tài liệu, hồ sơ năng lực kinh nghiệm", "Cố tình khiếu nại sai sự thật", "Nhà thầu tư vấn giám sát kiêm kiểm định"], correct: 1 },
  { id: 13, text: "Hành vi nào bị nghiêm cấm trong đấu thầu?", options: ["Tham dự thầu với tư cách nhà thầu độc lập", "Thay đổi tên nhà thầu sau khi trúng thầu", "Chuyển nhượng thầu trái quy định", "Thương thảo hợp đồng vượt giá dự thầu"], correct: 2 },
  { id: 14, text: "Hoạt động nào thuộc nội dung quản lý nhà nước về đấu thầu?", options: ["Trực tiếp ký hợp đồng cho các chủ đầu tư", "Quản lý cơ sở dữ liệu quốc gia về đấu thầu", "Lập hồ sơ dự thầu cho các doanh nghiệp", "Phê duyệt mọi kết quả đấu thầu cấp huyện"], correct: 1 },
  { id: 15, text: "Luật Đấu thầu 2023 quy định ưu đãi với gói thầu nào?", options: ["Gói thầu hàng hóa có xuất xứ Việt Nam", "Gói thầu có thầu nước ngoài liên danh thầu nội", "Gói thầu xây lắp giá trị trên 500 tỷ", "Tất cả các gói thầu đấu thầu quốc tế"], correct: 0 },
  { id: 16, text: "Bảo đảm dự thầu không áp dụng cho hình thức nào?", options: ["Đấu thầu rộng rãi", "Đấu thầu hạn chế", "Chỉ định thầu", "Chào hàng cạnh tranh"], correct: 2 },
  { id: 17, text: "Hiệu lực của hồ sơ dự thầu tính từ thời điểm nào?", options: ["Phát hành hồ sơ mời thầu", "Đóng thầu", "Mở thầu", "Ký hợp đồng"], correct: 1 },
  { id: 18, text: "Trách nhiệm của chủ đầu tư trong đấu thầu?", options: ["Phê duyệt kế hoạch lựa chọn nhà thầu", "Ký kết hợp đồng với nhà thầu", "Phê duyệt kết quả lựa chọn nhà đầu tư", "Thẩm định danh sách nhà thầu đạt kỹ thuật"], correct: 1 },
  { id: 19, text: "Thời gian chuẩn bị hồ sơ dự thầu tối thiểu đối với đấu thầu trong nước?", options: ["10 ngày", "15 ngày", "20 ngày", "30 ngày"], correct: 1 },
  { id: 20, text: "Hình thức lựa chọn nhà thầu phổ biến nhất là?", options: ["Chỉ định thầu", "Mua sắm trực tiếp", "Đấu thầu rộng rãi", "Chào hàng cạnh tranh"], correct: 2 },
  { id: 21, text: "Chỉ định thầu được áp dụng trong trường hợp nào?", options: ["Gói thầu xây lắp trên 100 tỷ", "Gói thầu cần thực hiện để khắc phục ngay sự cố bất khả kháng", "Gói thầu mua sắm hàng hóa thông dụng", "Mọi gói thầu dưới 5 tỷ"], correct: 1 },
  { id: 22, text: "Mua sắm trực tiếp áp dụng khi nhà thầu đã trúng thầu trước đó bao lâu?", options: ["6 tháng", "12 tháng", "18 tháng", "24 tháng"], correct: 1 },
  { id: 23, text: "Chào hàng cạnh tranh áp dụng cho gói thầu có giá trị bao nhiêu?", options: ["Dưới 1 tỷ", "Dưới 5 tỷ", "Dưới 10 tỷ", "Không quy định giá trị"], correct: 2 },
  { id: 24, text: "Bên mời thầu là ai?", options: ["Cơ quan sở hữu vốn", "Chủ đầu tư hoặc tổ chức được chủ đầu tư thuê", "Nhà thầu đứng đầu liên danh", "Người phê duyệt dự án"], correct: 1 },
  { id: 25, text: "Chi phí nộp hồ sơ dự thầu qua mạng?", options: ["Miễn phí", "Theo quy định của Bộ Kế hoạch và Đầu tư", "Do chủ đầu tư tự quy định", "1% giá gói thầu"], correct: 1 },
  { id: 26, text: "Hồ sơ mời thầu được phát hành khi nào?", options: ["Trước khi đăng thông báo mời thầu", "Cùng thời điểm đăng thông báo mời thầu", "Sau khi đóng thầu", "Sau khi có kết quả trúng thầu"], correct: 1 },
  { id: 27, text: "Tư cách hợp lệ của nhà thầu cá nhân?", options: ["Có năng lực hành vi dân sự đầy đủ", "Có chứng chỉ hành nghề phù hợp", "Đã đăng ký trên Hệ thống mạng đấu thầu quốc gia", "Tất cả phương án trên"], correct: 3 },
  { id: 28, text: "Nhà thầu phụ thực hiện khối lượng công việc tối đa bao nhiêu?", options: ["30% giá trị hợp đồng", "50% giá trị hợp đồng", "Theo thỏa thuận trong HSMT", "Không được dùng thầu phụ"], correct: 2 },
  { id: 29, text: "Hợp đồng trọn gói thường áp dụng cho loại gói thầu nào?", options: ["Tư vấn phức tạp", "Xây lắp quy mô nhỏ, hàng hóa thông dụng", "Gói thầu xây dựng cầu đường lớn", "Gói thầu cung cấp xăng dầu"], correct: 1 },
  { id: 30, text: "Trường hợp nào phải hủy thầu?", options: ["Có 1 nhà thầu vượt qua bước đánh giá kỹ thuật", "Tất cả hồ sơ dự thầu không đáp ứng HSMT", "Giá dự thầu thấp hơn giá gói thầu", "Thay đổi thời gian đóng thầu thêm 5 ngày"], correct: 1 },
  { id: 31, text: "Thời gian đánh giá hồ sơ dự thầu tối đa là bao nhiêu ngày?", options: ["30 ngày", "45 ngày", "60 ngày", "90 ngày"], correct: 1 },
  { id: 32, text: "Tổ chuyên gia do ai thành lập?", options: ["Người có thẩm quyền", "Bên mời thầu", "Cơ quan thanh tra", "Sở Kế hoạch và Đầu tư"], correct: 1 },
  { id: 33, text: "Giá dự thầu là gì?", options: ["Giá trong kế hoạch lựa chọn nhà thầu", "Giá ghi trong đơn dự thầu của nhà thầu", "Giá sau khi sửa lỗi và hiệu chỉnh sai lệch", "Giá trúng thầu"], correct: 1 },
  { id: 34, text: "Đấu thầu qua mạng bắt buộc áp dụng từ khi nào?", options: ["Lộ trình theo quy định của Chính phủ", "Mọi gói thầu từ 2024", "Chỉ áp dụng cho chào hàng cạnh tranh", "Áp dụng cho gói thầu trên 100 tỷ"], correct: 0 },
  { id: 35, text: "Hồ sơ dự thầu bị loại khi nào?", options: ["Không có bảo đảm dự thầu đúng quy định", "Chào giá cao hơn nhà thầu khác", "Kê khai thiếu một nhân sự dự phòng", "Gửi hồ sơ trước thời điểm đóng thầu 1 giờ"], correct: 0 },
  { id: 36, text: "Hành vi cản trở trong đấu thầu?", options: ["Nhà thầu hỏi làm rõ HSMT", "Cố tình khiếu nại sai sự thật để trì hoãn", "Chủ đầu tư yêu cầu giải trình giá thấp", "Đăng tải kết quả chậm 1 ngày"], correct: 1 },
  { id: 37, text: "Thẩm quyền giải quyết kiến nghị trong đấu thầu?", options: ["Chủ đầu tư và người có thẩm quyền", "Tòa án", "Cơ quan công an", "Phương án A và B đúng"], correct: 3 },
  { id: 38, text: "Mức bảo đảm thực hiện hợp đồng thường là?", options: ["1% - 3% giá hợp đồng", "2% - 10% giá hợp đồng", "10% - 20% giá hợp đồng", "Tùy nhà thầu quyết định"], correct: 1 },

  { id: 40, text: "Lựa chọn nhà thầu quốc tế khi nào?", options: ["Mọi gói thầu trên 10 tỷ", "Gói thầu mà thầu trong nước không đáp ứng yêu cầu", "Chủ đầu tư thích thầu ngoại", "Khi dùng vốn vay cá nhân"], correct: 1 },
  { id: 41, text: "Phương thức một giai đoạn hai túi hồ sơ áp dụng cho?", options: ["Chào hàng cạnh tranh", "Đấu thầu rộng rãi xây lắp quy mô nhỏ", "Đấu thầu rộng rãi cần đánh giá kỹ thuật riêng", "Chỉ định thầu rút gọn"], correct: 2 },

  { id: 44, text: "Nhà thầu liên danh có đặc điểm gì?", options: ["Chỉ một thầu chịu trách nhiệm", "Tất cả thành viên phải ký vào đơn dự thầu", "Không cần thỏa thuận liên danh", "Chỉ dùng cho thầu nước ngoài"], correct: 1 },
  { id: 45, text: "Thời gian công khai kết quả lựa chọn nhà thầu?", options: ["3 ngày làm việc", "5 ngày làm việc", "7 ngày làm việc", "10 ngày làm việc"], correct: 1 },
  { id: 46, text: " HSMT có nội dung hạn chế nhà thầu thì xử lý thế nào?", options: ["Nhà thầu vẫn phải tuân thủ", "Nhà thầu có quyền kiến nghị sửa đổi", "Chủ đầu tư mặc định đúng", "Hủy gói thầu ngay lập tức"], correct: 1 },
  { id: 47, text: "Bảo đảm dự thầu được trả lại khi nào?", options: ["Ngay sau khi mở thầu", "Sau khi có kết quả lựa chọn nhà thầu hoặc thầu không trúng", "Sau khi hợp đồng hết hạn bảo hành", "Không bao giờ trả lại"], correct: 1 },
  { id: 48, text: "DNNN thực hiện lựa chọn nhà thầu dự án đầu tư kinh doanh theo?", options: ["Luật Đấu thầu", "Luật Doanh nghiệp", "Luật Đầu tư", "Quy chế nội bộ tự xây dựng"], correct: 0 },
  { id: 49, text: "Trường hợp nào nhà thầu không được hoàn trả bảo đảm dự thầu?", options: ["Thầu trúng thầu nhưng từ chối ký hợp đồng", "Thầu không trúng thầu", "Thầu rút hồ sơ trước thời điểm đóng thầu", "HSMT bị hủy do lỗi của CĐT"], correct: 0 },
  { id: 50, text: "Danh sách ngắn là gì?", options: ["Danh sách các thầu bị loại", "Danh sách các thầu vượt qua bước sơ tuyển", "Danh sách thầu phụ", "Danh sách nhân sự chủ chốt"], correct: 1 },

  { id: 52, text: "Thanh tra đấu thầu do ai thực hiện?", options: ["Chủ đầu tư", "Cơ quan quản lý nhà nước về đấu thầu", "Nhà thầu độc lập", "Cơ quan công an cấp huyện"], correct: 1 },
  { id: 53, text: "Hồ sơ đề xuất áp dụng cho hình thức nào?", options: ["Đấu thầu rộng rãi", "Chào hàng cạnh tranh, chỉ định thầu", "Sơ tuyển nhà thầu", "Mua sắm tập trung"], correct: 1 },

  { id: 75, text: "Thông báo mời thầu đăng ở đâu?", options: ["Báo địa phương", "Hệ thống mạng đấu thầu quốc gia", "Web của nhà thầu", "Dán tại cửa cơ quan"], correct: 1 },

  { id: 81, text: "Hành vi lợi dụng chức vụ để can thiệp đấu thầu?", options: ["Làm rõ hồ sơ thầu", "Tác động trái pháp luật vào quá trình chọn thầu", "Phê duyệt kế hoạch đúng hạn", "Hướng dẫn thầu sử dụng phần mềm"], correct: 1 },

  { id: 100, text: "Nhà thầu bị coi là không độc lập khi?", options: ["Cùng một tổng công ty sở hữu trên 50% vốn", "Có chung một nhân sự làm chuyên gia chấm thầu", "Phương án A và B đúng", "Tham dự 2 gói thầu khác nhau của cùng CĐT"], correct: 2 },
  { id: 101, text: "Mục đích của đấu thầu?", options: ["Cạnh tranh, công bằng, minh bạch, hiệu quả", "Tăng giá bán hàng", "Tạo mối quan hệ cho CĐT", "Giảm số lượng thầu tham gia"], correct: 0 },
  { id: 102, text: "Cơ quan quản lý nhà nước cao nhất về đấu thầu?", options: ["Bộ Tài chính", "Bộ Kế hoạch và Đầu tư", "Bộ Xây dựng", "Chính phủ"], correct: 1 },
  { id: 103, text: "Việc đánh giá HSDT qua mạng do ai làm?", options: ["Robot tự động 100%", "Tổ chuyên gia đánh giá trên hệ thống", "Nhà thầu tự chấm điểm", "Bưu điện"], correct: 1 },
  { id: 104, text: "Thời gian hoàn trả bảo đảm dự thầu cho thầu không trúng?", options: ["20 ngày kể từ ngày kết quả được duyệt", "Sau 1 năm", "Không trả lại", "Sau khi thầu kiến nghị"], correct: 0 },
  { id: 105, text: " HSMT không được nêu?", options: ["Yêu cầu về kỹ thuật", "Nhãn hiệu, xuất xứ cụ thể của hàng hóa (trừ trường hợp đặc thù)", "Thời gian đóng thầu", "Tiêu chuẩn đánh giá"], correct: 1 },
  { id: 106, text: "Ưu đãi đối với doanh nghiệp khởi nghiệp sáng tạo?", options: ["Cộng điểm ưu tiên hoặc ưu tiên xếp hạng", "Miễn bảo đảm dự thầu", "Được chỉ định thầu mọi gói thầu", "Được tăng giá hợp đồng 20%"], correct: 0 },
  { id: 107, text: "Bảo lãnh thực hiện hợp đồng có hiệu lực đến khi nào?", options: ["Đến khi bàn giao", "Đến ngày cuối cùng của thời hạn bảo hành (hoặc theo thỏa thuận)", "Vĩnh viễn", "Đến khi thầu nhận đủ tiền"], correct: 1 },
  { id: 108, text: "Thay đổi thành viên liên danh sau khi đóng thầu?", options: ["Được thoải mái thay", "Không được phép thay đổi", "Được thay nếu thầu kia bị giải thể", "Chủ đầu tư tự ý thay"], correct: 1 },
  { id: 109, text: "Mua sắm trực tuyến (e-shopping) áp dụng cho?", options: ["Hàng hóa thông dụng, sẵn có trên thị trường", "Xây dựng cầu đường", "Tư vấn thiết kế đô thị", "Mua vũ khí quân sự"], correct: 0 },
  { id: 110, text: "Hành vi 'tiết lộ tài liệu hệ thống' bị phạt?", options: ["Cảnh cáo", "Cấm thầu/Xử lý theo pháp luật", "Phạt 1 triệu đồng", "Không bị phạt"], correct: 1 },
  { id: 111, text: "Hợp đồng theo thời gian áp dụng cho?", options: ["Mua sắm hàng hóa", "Dịch vụ tư vấn", "Xây lắp nhà cao tầng", "Chào hàng cạnh tranh"], correct: 1 },
  { id: 112, text: "Trường hợp không cần thương thảo hợp đồng?", options: ["Đấu thầu quốc tế", "Mua sắm hàng hóa qua mạng phương pháp giá thấp nhất", "Gói thầu hỗn hợp", "Xây lắp phức tạp"], correct: 1 },
  { id: 113, text: "Lưu trữ hồ sơ đấu thầu trong bao lâu?", options: ["5 năm", "10 năm", "Tối thiểu 20 năm hoặc theo quy định lưu trữ", "Xong việc thì hủy"], correct: 2 },
  { id: 114, text: "Nhà thầu không có tên trên Hệ thống mạng quốc gia?", options: ["Vẫn được trúng thầu", "Không được công nhận tư cách hợp lệ để xét duyệt trúng thầu", "Được nộp hồ sơ giấy thay thế", "Phạt tiền 10 triệu"], correct: 1 },
  { id: 115, text: "Hủy thầu do lỗi của bên mời thầu thì?", options: ["Bên mời thầu phải đền bù chi phí cho các nhà thầu", "Nhà thầu phải chịu", "Chính phủ đền bù", "Không ai phải chịu"], correct: 0 },
  { id: 116, text: "Cơ quan thẩm định kết quả lựa chọn nhà thầu?", options: ["Tổ chuyên gia", "Bộ phận có chức năng thẩm định của chủ đầu tư", "Thanh tra Chính phủ", "Nhà thầu đối thủ"], correct: 1 },
  { id: 117, text: "Kế hoạch lựa chọn nhà thầu phải đăng tải trong?", options: ["3 ngày làm việc", "7 ngày làm việc", "5 ngày làm việc", "24 giờ"], correct: 2 },
  { id: 118, text: "Sửa đổi HSMT sau khi phát hành?", options: ["Không được sửa", "Được sửa và phải thông báo cho các nhà thầu trước đóng thầu theo hạn định", "Chỉ sửa khi thầu đồng ý", "Sửa bí mật"], correct: 1 },
  { id: 119, text: "Giá dự thầu sau giảm giá là?", options: ["Giá dự thầu ban đầu", "Giá dự thầu trừ đi giá trị giảm giá", "Giá gói thầu", "Giá ký hợp đồng"], correct: 1 },
  { id: 120, text: "Phương pháp giá cố định áp dụng trong?", options: ["Tư vấn", "Hàng hóa", "Xây lắp", "Mua sắm trực tiếp"], correct: 0 },
  { id: 121, text: "Thành viên tổ chuyên gia phải có chứng chỉ?", options: ["Chứng chỉ hành nghề hoạt động đấu thầu", "Bằng lái xe", "Chứng chỉ tiếng Anh", "Không cần chứng chỉ"], correct: 0 },
  { id: 122, text: "Trách nhiệm giải trình thuộc về?", options: ["Người có thẩm quyền, CĐT, Bên mời thầu, Tổ chuyên gia", "Chỉ nhà thầu", "Chỉ người dân", "Chỉ đơn vị vận chuyển"], correct: 0 },
  { id: 123, text: "Hồ sơ mời thầu (HSMT) xây lắp gồm?", options: ["Bản vẽ thiết kế", "Tiên lượng kế hoạch", "Chỉ dẫn kỹ thuật", "Tất cả phương án trên"], correct: 3 },
  { id: 124, text: "Rút hồ sơ dự thầu thực hiện khi nào?", options: ["Trước thời điểm đóng thầu", "Sau khi mở thầu", "Lúc đang chấm thầu", "Sau khi có kết quả"], correct: 0 },
  { id: 125, text: "Nhà thầu phụ có được ký hợp đồng trực tiếp với CĐT?", options: ["Có", "Không (trừ trường hợp thầu phụ đặc biệt nêu trong hợp đồng)", "Tùy thầu phụ thích", "Chỉ khi thầu chính bỏ trốn"], correct: 1 },
  { id: 126, text: "Đấu thầu rộng rãi không hạn chế?", options: ["Số lượng nhà thầu tham dự", "Giá gói thầu", "Thời gian thi công", "Địa điểm thực hiện"], correct: 0 },
  { id: 127, text: "Bảo đảm dự thầu có giá trị bao nhiêu cho gói thầu lớn?", options: ["1% - 1.5%", "1% - 3%", "3% - 5%", "10%"], correct: 1 },
  { id: 128, text: "HSMT được coi là tài liệu?", options: ["Mật", "Công khai để thầu lập HSDT", "Chỉ thầu quen mới được xem", "Của nhà thầu"], correct: 1 },
  { id: 129, text: "Nhà thầu được xếp hạng thứ nhất khi?", options: ["Có giá thấp nhất sau đánh giá (nếu dùng pp giá thấp nhất)", "Có điểm tổng hợp cao nhất (nếu dùng pp kết hợp)", "Đạt kỹ thuật và có giá đánh giá thấp nhất", "Tất cả phương án trên tùy phương pháp áp dụng"], correct: 3 },
  { id: 130, text: "Trường hợp nào được điều chỉnh kế hoạch lựa chọn nhà thầu?", options: ["Thay đổi nguồn vốn hoặc phạm vi dự án", "Chủ đầu tư thích thay đổi", "Nhà thầu yêu cầu", "Sau khi đã mở thầu"], correct: 0 },
  { id: 131, text: "Trong đấu thầu rộng rãi, trường hợp có từ 03 nhà thầu trở lên vượt qua bước đánh giá về kỹ thuật thì danh sách xếp hạng nhà thầu được xác định như thế nào?", options: ["Xếp hạng căn cứ vào giá dự thầu thấp nhất", "Xếp hạng căn cứ vào điểm kỹ thuật cao nhất", "Xếp hạng căn cứ vào phương pháp đánh giá quy định trong HSMT", "Chủ đầu tư tự quyết định thứ tự xếp hạng"], correct: 2 },
  { id: 132, text: "Việc đánh giá hồ sơ dự thầu phải căn cứ vào tiêu chuẩn đánh giá hồ sơ dự thầu và các yêu cầu khác trong tài liệu nào?", options: ["Hồ sơ mời thầu", "Hồ sơ dự thầu của nhà thầu khác", "Báo cáo kinh tế kỹ thuật", "Quy định của nhà thầu"], correct: 0 },
  { id: 133, text: "Bảo đảm dự thầu có hiệu lực trong thời gian bao lâu?", options: ["Bằng thời gian có hiệu lực của HSDT", "Bằng thời gian có hiệu lực của HSDT cộng thêm 30 ngày", "Bằng thời gian có hiệu lực của HSDT cộng thêm 60 ngày", "Tùy ngân hàng quyết định"], correct: 1 },
  { id: 134, text: "Trong đấu thầu qua mạng, thời điểm đóng thầu là thời điểm nào?", options: ["Thời điểm nhà thầu nhấn nút nộp hồ sơ", "Thời điểm kết thúc nhận E-HSDT được quy định trên Hệ thống", "Thời điểm mở thầu", "Thời điểm hệ thống báo thành công"], correct: 1 },
  { id: 135, text: "Nhà thầu được coi là vi phạm hành vi 'Chuyển nhượng thầu' khi chuyển nhượng cho nhà thầu khác bao nhiêu phần trăm giá trị công việc?", options: ["Trên 10% giá trị gói thầu", "Trên 20% giá trị gói thầu", "Vượt mức tối đa dành cho nhà thầu phụ quy định trong hợp đồng", "Bất kỳ giá trị nào mà không được CĐT cho phép"], correct: 2 },
  { id: 136, text: "Hình thức bảo đảm dự thầu nào không được chấp nhận?", options: ["Thư bảo lãnh của tổ chức tín dụng", "Giấy chứng nhận quyền sử dụng đất", "Đặt cọc bằng Séc", "Tiền mặt"], correct: 1 },
  { id: 137, text: "Hồ sơ mời thầu (HSMT) được sửa đổi tối thiểu bao nhiêu ngày trước ngày đóng thầu đối với đấu thầu trong nước?", options: ["03 ngày làm việc", "05 ngày làm việc", "10 ngày", "15 ngày"], correct: 2 },
  { id: 138, text: "Đối với mua sắm hàng hóa, phương pháp giá đánh giá được xác định dựa trên?", options: ["Giá dự thầu sau sửa lỗi, hiệu chỉnh sai lệch", "Giá dự thầu cộng với các chi phí vận hành, bảo trì, rủi ro... trên cùng một mặt bằng", "Giá thấp nhất trong các thầu", "Điểm kỹ thuật"], correct: 1 },
  { id: 139, text: "Người có thẩm quyền có quyền đình chỉ cuộc thầu khi nào?", options: ["Khi thấy giá dự thầu quá cao", "Khi có bằng chứng cho thấy cuộc thầu có hành vi vi phạm pháp luật", "Khi nhà thầu yêu cầu", "Khi muốn thay đổi thiết kế"], correct: 1 },
  { id: 140, text: "Bảo đảm thực hiện hợp đồng áp dụng cho loại hợp đồng nào?", options: ["Hợp đồng tư vấn", "Hợp đồng hàng hóa, xây lắp, phi tư vấn, hỗn hợp", "Hợp đồng thầu phụ", "Mọi loại hợp đồng dưới 100 triệu"], correct: 1 },
  { id: 141, text: "Gói thầu quy mô nhỏ là gói thầu có giá trị như thế nào?", options: ["Dưới 10 tỷ đồng", "Cung cấp hàng hóa, phi tư vấn dưới 10 tỷ; xây lắp dưới 20 tỷ", "Dưới 100 tỷ đồng", "Dưới 5 tỷ đồng"], correct: 1 },
  { id: 142, text: "Việc thương thảo hợp đồng không bao gồm nội dung nào?", options: ["Làm rõ các nội dung chưa chi tiết trong HSDT", "Thay đổi đơn giá dự thầu của nhà thầu", "Thỏa thuận về các bước thanh toán", "Thay đổi nhân sự (nếu cần thiết và được chấp thuận)"], correct: 1 },
  { id: 143, text: "Thời hạn tối đa để chủ đầu tư ký kết hợp đồng sau khi có kết quả lựa chọn nhà thầu?", options: ["10 ngày", "20 ngày", "Theo thời gian có hiệu lực của HSDT", "30 ngày"], correct: 2 },
  { id: 144, text: "Nhà thầu nước ngoài có được hưởng ưu đãi không?", options: ["Không", "Có, nếu liên danh với nhà thầu trong nước mà nhà thầu trong nước đảm nhận trên 25% giá trị", "Có, nếu có giá thấp nhất", "Có, nếu dùng hàng hóa Việt Nam"], correct: 1 },
  { id: 145, text: " HSMT không được đưa ra yêu cầu về nhãn hiệu, xuất xứ trừ trường hợp?", options: ["Gói thầu hàng hóa thông dụng", "Không thể mô tả chi tiết đặc tính kỹ thuật", "Chủ đầu tư chỉ định sản phẩm", "Gói thầu xây lắp"], correct: 1 },
  { id: 146, text: "Trình tự lựa chọn nhà thầu đối với đấu thầu rộng rãi?", options: ["Chuẩn bị -> Tổ chức -> Đánh giá -> Thương thảo -> Thẩm định -> Phê duyệt -> Ký hợp đồng", "Phát hành -> Thu hồ sơ -> Chấm điểm -> Ký", "CĐT chọn -> Thẩm định -> Ký", "Mở thầu -> Chấm thầu -> Ký"], correct: 0 },
  { id: 147, text: "Trong phương thức một giai đoạn hai túi hồ sơ, túi hồ sơ nào được mở trước?", options: ["Túi hồ sơ đề xuất tài chính", "Túi hồ sơ đề xuất kỹ thuật", "Mở cả hai cùng lúc", "Tùy CĐT chọn"], correct: 1 },
  { id: 148, text: "Khi nào thì mở túi hồ sơ đề xuất tài chính?", options: ["Sau khi mở túi kỹ thuật 1 tiếng", "Sau khi có danh sách nhà thầu đạt yêu cầu về kỹ thuật", "Sau khi ký hợp đồng", "Ngay khi có lệnh mở thầu"], correct: 1 },
  { id: 149, text: "Nhà thầu phụ có quyền tham gia liên danh với nhà thầu chính không?", options: ["Có", "Không, thầu phụ và thầu chính phải độc lập", "Có nếu CĐT đồng ý", "Chỉ áp dụng với gói xây lắp"], correct: 1 },
  { id: 150, text: "Thông tin về kết quả lựa chọn nhà thầu gồm những gì?", options: ["Tên nhà thầu trúng thầu", "Giá trúng thầu, loại hợp đồng", "Danh sách nhà thầu không trúng thầu và lý do", "Tất cả phương án trên"], correct: 3 },
  { id: 151, text: "Ưu đãi trong lựa chọn nhà thầu xây lắp được tính bằng cách?", options: ["Trừ tiền vào giá dự thầu để so sánh", "Cộng thêm điểm vào điểm tổng hợp", "Cộng thêm tiền vào giá dự thầu của đối tượng không được ưu đãi để so sánh", "Giảm trực tiếp giá hợp đồng"], correct: 2 },
  { id: 152, text: "Cơ quan nào có trách nhiệm giải quyết kiến nghị về các vấn đề trong quá trình lựa chọn nhà thầu?", options: ["Chủ đầu tư", "Người có thẩm quyền", "Hội đồng tư vấn giải quyết kiến nghị", "Tất cả các cơ quan trên tùy theo cấp kiến nghị"], correct: 3 },
  { id: 153, text: "Hồ sơ mời thầu không được sửa đổi khi nào?", options: ["Sau khi phát hành", "Sau khi đóng thầu", "Trước khi đóng thầu", "Khi nhà thầu yêu cầu"], correct: 1 },
  { id: 154, text: "Bên mời thầu phải gửi thông báo kết quả lựa chọn nhà thầu cho?", options: ["Chỉ nhà thầu trúng thầu", "Tất cả các nhà thầu tham dự thầu", "Cơ quan báo chí", "Cơ quan công an"], correct: 1 },
  { id: 155, text: "Thời gian tối thiểu để nhà thầu chuẩn bị HSDT đối với đấu thầu hạn chế?", options: ["10 ngày", "15 ngày", "20 ngày", "30 ngày"], correct: 1 },
  { id: 156, text: "Hợp đồng đơn giá cố định được áp dụng cho loại công việc nào?", options: ["Công việc chưa xác định được khối lượng chính xác", "Công việc đã xác định rõ về bản chất nhưng chưa chính xác về số lượng", "Công việc đơn giản, ngắn hạn", "Tất cả phương án trên"], correct: 1 },
  { id: 157, text: "Mục đích của bảo đảm thực hiện hợp đồng?", options: ["Để nhà thầu cam kết tham gia thầu", "Để bảo đảm trách nhiệm thực hiện hợp đồng của nhà thầu", "Để thanh toán tiền tạm ứng", "Để bảo hành công trình"], correct: 1 },
  { id: 158, text: "Nhà thầu không được rút bảo đảm dự thầu khi nào?", options: ["Sau khi mở thầu", "Trước khi đóng thầu", "Khi CĐT hủy thầu", "Khi thầu bị trượt"], correct: 0 },
  { id: 159, text: "Trường hợp nào được phép chỉ định thầu?", options: ["Gói thầu mua sắm hàng hóa thông dụng", "Gói thầu cung cấp dịch vụ tư vấn đơn giản", "Gói thầu cần thực hiện để bảo vệ bí mật nhà nước", "Mọi gói thầu dưới 10 tỷ"], correct: 2 },
  { id: 160, text: "Giá trúng thầu có được vượt giá gói thầu không?", options: ["Không được vượt", "Được vượt nếu có dự phòng", "Được vượt nếu người có thẩm quyền phê duyệt điều chỉnh kế hoạch", "Có nếu nhà thầu giải trình được"], correct: 2 },
  { id: 161, text: "Khi đánh giá HSDT, nếu có sự khác biệt giữa đơn giá và thành tiền thì lấy giá trị nào?", options: ["Thành tiền", "Đơn giá", "Giá trị nào thấp hơn", "Giá trị nào cao hơn"], correct: 1 },
  { id: 162, text: "HSMT có được yêu cầu nhân sự là công chức nhà nước không?", options: ["Có", "Không", "Có nếu làm thầu phụ", "Có nếu có chứng chỉ"], correct: 1 },
  { id: 163, text: "Hợp đồng hỗn hợp là loại hợp đồng gì?", options: ["Kết hợp nhiều loại hợp đồng: trọn gói, đơn giá cố định...", "Nhiều nhà thầu cùng làm", "Nhiều chủ đầu tư cùng ký", "Cả thầu trong và ngoài nước"], correct: 0 },
  { id: 164, text: "Lựa chọn nhà thầu qua mạng áp dụng cho hình thức nào?", options: ["Chỉ chào hàng cạnh tranh", "Đấu thầu rộng rãi, hạn chế, chào hàng cạnh tranh", "Chỉ chỉ định thầu", "Mua sắm trực tiếp"], correct: 1 },
  { id: 165, text: "Thời gian có hiệu lực của bảo đảm dự thầu thường dài hơn hiệu lực HSDT bao lâu?", options: ["15 ngày", "30 ngày", "45 ngày", "60 ngày"], correct: 1 },
  { id: 166, text: "Nếu nhà thầu không gia hạn hiệu lực HSDT khi được yêu cầu thì?", options: ["Bị cấm thầu", "Hồ sơ dự thầu không còn giá trị và được trả lại bảo đảm dự thầu", "Bị tịch thu bảo đảm dự thầu", "Vẫn được chấm thầu"], correct: 1 },
  { id: 167, text: "Chi phí mua HSMT đối với đấu thầu trong nước tối đa là?", options: ["Miễn phí đối với đấu thầu qua mạng", "2 triệu đồng", "5 triệu đồng", "10 triệu đồng"], correct: 0 },
  { id: 168, text: "Cơ quan thẩm định kế hoạch lựa chọn nhà thầu thuộc thẩm quyền của Chủ tịch UBND tỉnh?", options: ["Sở Tài chính", "Sở Kế hoạch và Đầu tư", "Văn phòng UBND tỉnh", "Sở Xây dựng"], correct: 1 },
  { id: 169, text: "Nhà thầu cá nhân có được tham gia đấu thầu rộng rãi không?", options: ["Có, đối với gói thầu dịch vụ tư vấn phù hợp", "Không", "Chỉ được làm thầu phụ", "Chỉ gói thầu hàng hóa"], correct: 0 },
  { id: 170, text: "Việc đánh giá hồ sơ dự thầu được thực hiện bởi?", options: ["Chủ đầu tư", "Bên mời thầu", "Tổ chuyên gia", "Người có thẩm quyền"], correct: 2 },
  { id: 171, text: "Thời gian đăng tải thông báo mời thầu tối thiểu bao lâu trước khi phát hành HSMT?", options: ["03 ngày làm việc", "05 ngày", "07 ngày", "10 ngày"], correct: 0 },
  { id: 172, text: "Nhà thầu vi phạm hành vi 'Gian lận' bị cấm tham gia hoạt động đấu thầu từ?", options: ["1 đến 3 năm", "3 đến 5 năm", "5 đến 10 năm", "Vĩnh viễn"], correct: 1 },
  { id: 173, text: "Trường hợp nào được rút hồ sơ dự thầu mà không bị tịch thu bảo đảm?", options: ["Trước thời điểm đóng thầu", "Sau thời điểm đóng thầu", "Khi đang chấm thầu", "Khi đã xếp hạng thứ nhất"], correct: 0 },
  { id: 174, text: "Hình thức đấu thầu rộng rãi áp dụng khi nào?", options: ["Chỉ cho gói thầu trên 100 tỷ", "Áp dụng cho mọi gói thầu trừ trường hợp đặc thù", "Khi có yêu cầu của thầu", "Gói thầu đơn giản"], correct: 1 },
  { id: 175, text: "Hồ sơ dự thầu gồm bao nhiêu túi hồ sơ trong phương thức một giai đoạn một túi hồ sơ?", options: ["1 túi chứa cả kỹ thuật và tài chính", "2 túi riêng biệt", "3 túi", "Không giới hạn"], correct: 0 },
  { id: 176, text: "Ai là người phê duyệt kế hoạch lựa chọn nhà thầu?", options: ["Chủ đầu tư", "Người có thẩm quyền", "Bên mời thầu", "Bộ Kế hoạch và Đầu tư"], correct: 1 },
  { id: 177, text: "Hợp đồng theo đơn giá điều chỉnh thường áp dụng cho?", options: ["Gói thầu mua sắm hàng hóa ngắn hạn", "Gói thầu xây lắp có thời gian thực hiện trên 18 tháng", "Gói thầu tư vấn", "Mua sắm trực tiếp"], correct: 1 },
  { id: 178, text: "Hành vi cản trở thầu là hành vi?", options: ["Hỏi làm rõ HSMT", "Cố tình trì hoãn việc mở thầu, chấm thầu mà không có lý do chính đáng", "Đề nghị gia hạn đóng thầu", "CĐT yêu cầu bổ sung tài liệu"], correct: 1 },
  { id: 179, text: "Tiêu chuẩn đánh giá kỹ thuật đối với hàng hóa thường là?", options: ["Đạt/Không đạt", "Chấm điểm", "Kết hợp Đạt/Không đạt và chấm điểm", "Cả A và B đều đúng"], correct: 3 },
  { id: 180, text: " HSMT có nội dung không rõ ràng thì nhà thầu nên làm gì?", options: ["Tự đoán và làm", "Gửi văn bản yêu cầu bên mời thầu làm rõ", "Không tham gia nữa", "Kiện lên tòa án ngay"], correct: 1 },
  { id: 181, text: "Trách nhiệm phê duyệt HSMT thuộc về?", options: ["Bên mời thầu", "Chủ đầu tư", "Người có thẩm quyền", "Tổ chuyên gia"], correct: 1 },
  { id: 182, text: "Thời gian chuẩn bị HSDT được tính từ ngày nào?", options: ["Ngày đăng thông báo mời thầu", "Ngày đầu tiên phát hành HSMT", "Ngày ký quyết định phê duyệt HSMT", "Ngày thầu mua hồ sơ"], correct: 1 },
  { id: 183, text: "Bảo lãnh dự thầu có giá trị thấp hơn quy định xử lý thế nào?", options: ["Cho phép nộp bổ sung", "Loại bỏ hồ sơ dự thầu", "Cảnh cáo nhà thầu", "CĐT tự bù phần thiếu"], correct: 1 },
  { id: 184, text: "Đấu thầu qua mạng giúp ích gì?", options: ["Tiết kiệm chi phí, thời gian", "Tăng tính công khai, minh bạch", "Hạn chế tiêu cực", "Tất cả phương án trên"], correct: 3 },
  { id: 185, text: "Trường hợp nào không phải nộp bảo đảm dự thầu?", options: ["Đấu thầu rộng rãi hàng hóa", "Chào hàng cạnh tranh xây lắp", "Đấu thầu cung cấp dịch vụ tư vấn", "Đấu thầu hạn chế xây lắp"], correct: 2 },
  { id: 186, text: "Việc thay đổi thời điểm đóng thầu phải được thông báo?", options: ["Bằng văn bản cho các thầu đã mua hồ sơ và đăng Hệ thống", "Chỉ cần đăng báo", "Gửi tin nhắn điện thoại", "Không cần thông báo"], correct: 0 },
  { id: 187, text: "Thành viên tổ chuyên gia phải có bằng cấp tối thiểu là?", options: ["Trung cấp", "Đại học", "Cao đẳng", "Không quy định"], correct: 1 },
  { id: 188, text: "Đánh giá HSDT theo phương pháp điểm kỹ thuật áp dụng cho?", options: ["Gói thầu mua sắm hàng hóa đơn giản", "Gói thầu tư vấn", "Gói thầu xây lắp thông dụng", "Mua sắm trực tiếp"], correct: 1 },
  { id: 189, text: "Bảo đảm thực hiện hợp đồng có được trả lại không?", options: ["Không", "Được trả lại sau khi nhà thầu hoàn thành nghĩa vụ hợp đồng hoặc chuyển sang bảo hành", "Trả lại ngay khi ký hợp đồng", "Trả lại khi thầu yêu cầu"], correct: 1 },
  { id: 190, text: "Hồ sơ dự thầu không hợp lệ khi?", options: ["Không có đơn dự thầu", "Đơn dự thầu không hợp lệ", "Không có bảo đảm dự thầu", "Tất cả phương án trên"], correct: 3 },
  { id: 191, text: "Kiến nghị về nội dung HSMT phải gửi trước đóng thầu bao lâu?", options: ["03 ngày làm việc", "05 ngày làm việc", "07 ngày làm việc", "10 ngày"], correct: 0 },
  { id: 192, text: "Hợp đồng trọn gói được thanh toán dựa trên?", options: ["Khối lượng thực tế thi công", "Giá trị ghi trong hợp đồng đã ký kết", "Khối lượng trong thiết kế", "Hóa đơn nhà thầu nộp"], correct: 1 },
  { id: 193, text: "Tư cách hợp lệ của nhà thầu nước ngoài là gì?", options: ["Đăng ký kinh doanh theo luật nước họ", "Không bị cấm thầu", "Có tên trên hệ thống quốc gia", "Cả A và B đúng"], correct: 3 },
  { id: 194, text: "Bên mời thầu không được làm gì?", options: ["Tiết lộ thông tin HSDT của thầu này cho thầu khác", "Giải thích HSMT", "Đăng tải thông tin thầu", "Gia hạn thời gian thầu"], correct: 0 },
  { id: 195, text: "Hồ sơ dự thầu trúng thầu phải có giá?", options: ["Thấp nhất", "Cao nhất", "Giá đánh giá thấp nhất hoặc điểm tổng hợp cao nhất", "Bằng giá gói thầu"], correct: 2 },
  { id: 196, text: "Bảo lãnh thực hiện hợp đồng của nhà thầu liên danh?", options: ["Chỉ cần thầu đứng đầu liên danh nộp", "Từng thành viên nộp theo tỷ lệ hoặc thầu đứng đầu nộp cho cả liên danh", "Ngân hàng nộp thay", "CĐT tự trích lương nhà thầu"], correct: 1 },
  { id: 197, text: " HSMT quy định sai lệch so với Luật Đấu thầu thì?", options: ["Nhà thầu vẫn làm theo HSMT", "CĐT phải đính chính sửa đổi theo Luật", "Hủy cuộc thầu ngay", "Nhà thầu tự sửa HSMT"], correct: 1 },
  { id: 198, text: "Việc nộp hồ sơ dự thầu qua mạng kết thúc vào lúc nào?", options: ["24h00 ngày hôm trước", "Thời điểm đóng thầu quy định", "Lúc mở thầu", "Tùy thầu chọn"], correct: 1 },
  { id: 199, text: "Trường hợp nào giá hợp đồng được điều chỉnh?", options: ["Hợp đồng trọn gói", "Hợp đồng theo đơn giá điều chỉnh và các trường hợp bất khả kháng", "Mọi loại hợp đồng khi thầu lỗ", "Khi CĐT muốn tăng"], correct: 1 },
  { id: 200, text: "Người có thẩm quyền có trách nhiệm phê duyệt?", options: ["Hồ sơ mời thầu", "Kết quả lựa chọn nhà thầu", "Kế hoạch lựa chọn nhà thầu", "Hợp đồng"], correct: 2 },
  { id: 201, text: "Điều nào sau đây KHÔNG đúng khi thực hiện tùy chọn mua thêm?", options: ["Khối lượng mua thêm không vượt vượt 50% so với hợp đồng gốc", "Nhà thầu đã trúng thầu thông qua đấu thầu rộng rãi hoặc đàm phán giá", "Có dự toán được phê duyệt cho phần khối lượng mua thêm", "Đơn giá phần tùy chọn không vượt đơn giá hợp đồng gốc"], correct: 0 },
  { id: 202, text: "Chủ đầu tư phải công khai kết quả lựa chọn nhà thầu khi nào?", options: ["Bất kỳ thời điểm nào sau khi phê duyệt", "Trong khoảng thời gian tối đa 05 ngày kể từ khi phê duyệt", "Trong khoảng thời gian tối đa 05 ngày làm việc kể từ khi phê duyệt", "Không bắt buộc"], correct: 2 },
  { id: 203, text: "Mục đích chính của hội nghị tiền đấu thầu là gì?", options: ["Ký hợp đồng nguyên tắc", "Trao đổi, làm rõ các nội dung trong HSMT", "Tổ chức lễ công bố dự án", "Thông báo kết quả"], correct: 1 },
  { id: 204, text: "Nếu HSMT không nêu xuất xứ Việt Nam trong nhóm nước, thì hàng hóa xuất xứ Việt Nam sẽ?", options: ["Bị loại", "Chỉ được đánh giá nếu giá thấp nhất", "Vẫn được xem xét và đánh giá", "CĐT quyết định"], correct: 2 },
  { id: 205, text: "Biên bản mở thầu (không qua mạng) phải được đăng tải trên Hệ thống trong bao lâu?", options: ["48 giờ", "24 giờ", "12 giờ", "72 giờ"], correct: 1 },
  { id: 206, text: "Tùy chọn mua thêm là gì?", options: ["Quyền của nhà thầu", "Sự thay đổi đơn giá", "Quyền của CĐT mua bổ sung ngoài khối lượng hợp đồng", "Quyền hủy thầu"], correct: 2 },
  { id: 207, text: "Đối với cơ sở y tế công lập, trường hợp nào không thuộc đối tượng Luật Đấu thầu?", options: ["Gửi nhu cầu cho đơn vị MSTT", "Tự tổ chức mua sắm nếu đơn vị MSTT không tổng hợp", "Tất cả đáp án trên đều đúng", "Thanh toán theo giá dịch vụ BHYT"], correct: 2 },
  { id: 208, text: "Việc sửa đổi hợp đồng được thực hiện khi nào?", options: ["Sau khi hoàn thành", "Trong thời gian hợp đồng còn hiệu lực", "Trước khi ký", "Vĩnh viễn"], correct: 1 },
  { id: 209, text: "Tại thời điểm ký kết hợp đồng, hồ sơ dự thầu của nhà thầu phải?", options: ["Được CĐT xác nhận lại", "Còn hiệu lực", "Được cơ quan thẩm quyền đóng dấu", "Bổ sung thầu phụ mới"], correct: 1 },
  { id: 210, text: "Thành viên tổ chuyên gia chịu trách nhiệm về việc đánh giá HSDT trước ai?", options: ["Chủ đầu tư", "Pháp luật", "Bên mời thầu", "Tổ trưởng"], correct: 1 },
  { id: 211, text: "Nhà thầu tham dự thầu phải độc lập về pháp lý và tài chính với?", options: ["Nhà thầu tư vấn lập HSMT", "Nhà thầu tư vấn đánh giá HSDT", "Các nhà thầu khác trong thầu hạn chế", "Tất cả các bên nêu trên"], correct: 3 },
  { id: 212, text: "File đính kèm trong E-HSDT không được đánh giá nếu?", options: ["Nhiễm virus", "Sai định dạng", "Bị nén lỗi", "Tất cả đáp án trên"], correct: 3 },
  { id: 213, text: "Mua sắm hàng hóa, xây lắp có được bổ sung nhân sự chủ chốt không?", options: ["Được, nếu nhân sự trước đó không đáp ứng hoặc không huy động được", "Không được", "Tùy thầu chọn", "Tùy ngân hàng"], correct: 0 },
  { id: 214, text: "Ai có quyền nộp đơn kiến nghị về nội dung HSMT?", options: ["Nhà thầu đã nộp HSDT", "Nhà thầu đã đăng ký trên Hệ thống", "Cơ quan nhà nước", "Nhà thầu quan tâm đã tải HSMT"], correct: 3 },
  { id: 215, text: "Thời gian tối thiểu thầu chào giá trực tuyến thông thường là?", options: ["03 giờ", "02 giờ", "01 giờ", "05 giờ"], correct: 0 },
  { id: 216, text: "Nội dung nào trong HSMT bị coi là hạn chế cạnh tranh?", options: ["Yêu cầu kinh nghiệm tương tự", "Yêu cầu năng lực tài chính", "Yêu cầu xác nhận tham dự hội nghị tiền đấu thầu là bắt buộc", "Yêu cầu bằng cấp nhân sự"], correct: 2 },
  { id: 217, text: "Nguyên tắc thanh toán hợp đồng dựa trên?", options: ["Dự toán gói thầu", "Điều khoản hợp đồng và thực tế thực hiện", "Giá thấp nhất thị trường", "Quy định của nhà thầu"], correct: 1 },
  { id: 218, text: "Nhà thầu trúng thầu nhiều phần trong mua sắm tập trung phải nộp?", options: ["Bản sao hợp đồng cũ", "Cam kết bảo đảm năng lực thực hiện toàn bộ", "Danh sách thầu phụ", "Đơn xin giảm giá"], correct: 1 },
  { id: 219, text: "Nếu thầu hạng nhất vượt định mức đơn giá, CĐT xử lý thế nào?", options: ["Hủy thầu", "Loại thầu", "Mời đàm phán đơn giá", "Mời thầu tiếp theo"], correct: 2 },
  { id: 220, text: "Dịch vụ phi tư vấn bao gồm?", options: ["Quản lý dự án", "Logistics, bảo hiểm, vệ sinh, quảng cáo", "Thiết kế, giám sát", "Kiểm toán"], correct: 1 },
  { id: 221, text: "Hợp đồng đơn giá cố định áp dụng khi?", options: ["Khối lượng không đổi", "Khối lượng chưa xác định chính xác", "Khối lượng xác định rõ", "Giá thay đổi theo thị trường"], correct: 1 },
  { id: 222, text: "Chủ đầu tư giải quyết kiến nghị trong bao lâu?", options: ["07 ngày", "10 ngày làm việc", "05 ngày làm việc", "15 ngày"], correct: 2 },

  { id: 291, text: "Ưu đãi đối với hàng hóa có chi phí sản xuất trong nước từ bao nhiêu % thì được hưởng?", options: ["10%", "25%", "50%", "75%"], correct: 1 },
  { id: 292, text: "Thời gian tối thiểu để nhà thầu chuẩn bị hồ sơ dự thầu quốc tế?", options: ["30 ngày", "40 ngày", "60 ngày", "90 ngày"], correct: 1 },
  { id: 293, text: "Hợp đồng đơn giá điều chỉnh khác đơn giá cố định ở chỗ?", options: ["Khối lượng thay đổi", "Đơn giá được thay đổi theo biến động thị trường", "Thời gian thay đổi", "Không cần tạm ứng"], correct: 1 },
  { id: 294, text: "Việc kiểm tra đấu thầu được thực hiện theo?", options: ["Định kỳ hoặc đột xuất", "Chỉ khi có khiếu nại", "Chỉ khi dự án kết thúc", "Cứ 10 năm một lần"], correct: 0 },
  { id: 295, text: "Danh sách xếp hạng nhà thầu có phải là kết quả trúng thầu không?", options: ["Có", "Không, đây là bước trước khi thương thảo hoặc phê duyệt kết quả", "Chỉ đối với tư vấn", "Chỉ đối với gói thầu nhỏ"], correct: 1 },
  { id: 296, text: "Tiền bảo đảm dự thầu được nộp vào đâu?", options: ["Tài khoản của bên mời thầu", "Tài khoản của chủ đầu tư", "Tài khoản cơ quan công an", "Túi cá nhân"], correct: 1 },
  { id: 297, text: "Trường hợp nào thầu được hoàn lại bảo đảm thực hiện hợp đồng?", options: ["Thầu bị hủy hợp đồng do lỗi của thầu", "Thầu hoàn thành nghĩa vụ hợp đồng", "Thầu xin rút không làm nữa", "Khi đang làm dở"], correct: 1 },
  { id: 298, text: "Lựa chọn danh sách ngắn áp dụng cho hình thức nào?", options: ["Chào hàng cạnh tranh", "Đấu thầu rộng rãi có sơ tuyển hoặc đấu thầu hạn chế", "Chỉ định thầu", "Mua sắm trực tiếp"], correct: 1 },
  { id: 299, text: "Trình độ chuyên môn của tổ chuyên gia chấm thầu?", options: ["Phải am hiểu về nội dung cụ thể của gói thầu", "Am hiểu về pháp luật đấu thầu", "Có khả năng ngoại ngữ (nếu thầu quốc tế)", "Tất cả phương án trên"], correct: 3 },
  { id: 300, text: "Giá dự thầu của nhà thầu phải bao gồm những gì?", options: ["Giá hàng hóa/xây lắp", "Các loại thuế, phí, lệ phí", "Chi phí vận chuyển, rủi ro", "Tất cả phương án trên"], correct: 3 },
  { id: 301, text: "Khi nào thì được phép thay đổi đơn giá hợp đồng trọn gói?", options: ["Khi giá thị trường tăng 20%", "Khi thay đổi phạm vi công việc so với hợp đồng ban đầu", "Khi nhà thầu báo lỗ", "Không bao giờ được thay đổi"], correct: 1 },
  { id: 302, text: "Thời hạn gửi văn bản thông báo kết quả lựa chọn nhà thầu?", options: ["05 ngày làm việc từ khi có quyết định", "10 ngày", "24 giờ", "03 ngày làm việc"], correct: 0 },
  { id: 303, text: " HSMT do tổ chuyên gia lập phải được?", options: ["Nhà thầu duyệt", "Đơn vị thẩm định kiểm tra và CĐT phê duyệt", "Bên mời thầu tự ý ban hành", "Đăng báo ngay"], correct: 1 },
  { id: 304, text: "Hồ sơ dự thầu trúng thầu là hồ sơ?", options: ["Có giá thấp nhất", "Đạt điểm kỹ thuật cao nhất", "Được xếp hạng thứ nhất và được phê duyệt trúng thầu", "Có quan hệ tốt với CĐT"], correct: 2 },
  { id: 305, text: "Bảo đảm thực hiện hợp đồng của nhà thầu liên danh?", options: ["Chỉ cần thầu chính nộp", "Từng thành viên nộp theo tỷ lệ hoặc đại diện liên danh nộp cho cả liên danh", "Không cần nộp", "Ngân hàng nộp thay"], correct: 1 },
  { id: 306, text: "Ưu đãi cho hàng hóa Việt Nam trong đấu thầu quốc tế?", options: ["Cộng thêm 7.5% vào giá đánh giá của hàng hóa nước ngoài", "Trừ 7.5% vào giá dự thầu của hàng nội", "Cộng điểm kỹ thuật", "A hoặc B đúng tùy HSMT"], correct: 3 },
  { id: 307, text: "Việc xử lý tình huống trong đấu thầu thuộc thẩm quyền của?", options: ["Người có thẩm quyền hoặc Chủ đầu tư", "Tổ chuyên gia", "Nhà thầu", "Cơ quan công an"], correct: 0 },
  { id: 308, text: "Hợp đồng thầu phụ ký với ai?", options: ["Chủ đầu tư", "Nhà thầu chính", "Người có thẩm quyền", "Đơn vị tư vấn"], correct: 1 },
  { id: 309, text: "Thời gian giải quyết kiến nghị của Người có thẩm quyền là?", options: ["05 ngày làm việc", "10 ngày", "15 ngày", "20 ngày"], correct: 0 },
  { id: 310, text: "Nhà thầu có quyền kiện ra tòa án khi nào?", options: ["Ngay khi thấy HSMT không hay", "Khi không đồng ý với kết quả giải quyết kiến nghị", "Khi bị trượt thầu", "Khi CĐT hỏi làm rõ"], correct: 1 },
  { id: 311, text: "Hồ sơ dự thầu qua mạng (E-HSDT) gồm?", options: ["Webform trên hệ thống", "Các file đính kèm", "Cả A và B", "Chỉ cần file Word"], correct: 2 },
  { id: 312, text: "Bảo đảm dự thầu trong đấu thầu qua mạng?", options: ["Nộp bản giấy", "Bảo lãnh điện tử do Ngân hàng kết nối với Hệ thống phát hành", "Không cần nộp", "Gửi chuyển phát nhanh"], correct: 1 },
  { id: 313, text: "Trách nhiệm đăng tải thông tin đấu thầu lên Hệ thống thuộc về?", options: ["Bên mời thầu", "Nhà thầu", "Người dân", "Bưu điện"], correct: 0 },
  { id: 314, text: " HSMT quy định nhà thầu phải có chứng chỉ ISO là?", options: ["Hạn chế cạnh tranh", "Phù hợp tiêu chuẩn", "Tùy quy mô gói thầu", "Bắt buộc mọi gói thầu"], correct: 2 },
  { id: 315, text: "Khi đánh giá HSDT, nếu có sự không thống nhất giữa file đính kèm và webform thì?", options: ["Ưu tiên file đính kèm", "Ưu tiên nội dung trên webform", "Hủy hồ sơ nhà thầu", "Yêu cầu thầu nộp lại bản giấy"], correct: 1 },
  { id: 316, text: "Giá dự thầu được công khai tại?", options: ["Lễ mở thầu (hoặc biên bản mở thầu online)", "Lúc ký hợp đồng", "Trong HSMT", "Sau khi xong dự án"], correct: 0 },
  { id: 317, text: "Ưu tiên doanh nghiệp nhỏ trong gói thầu xây lắp dưới bao nhiêu tỷ?", options: ["2 tỷ", "5 tỷ", "10 tỷ", "20 tỷ"], correct: 1 },
  { id: 318, text: "Thanh toán hợp đồng xây lắp thường căn cứ vào?", options: ["Số ngày làm việc", "Biên bản nghiệm thu khối lượng hoàn thành", "Ước tính của thầu", "Giá thị trường"], correct: 1 },
  { id: 319, text: "Nhà thầu 'quân xanh quân đỏ' là hành vi?", options: ["Gian lận", "Thông thầu", "Cản trở", "Ưu đãi"], correct: 1 },
  { id: 320, text: "Việc thương thảo hợp đồng đối với gói thầu mua sắm hàng hóa qua mạng?", options: ["Bắt buộc 100%", "Không bắt buộc nếu dùng pp giá thấp nhất và thầu chấp nhận HSMT", "Chỉ làm với thầu nước ngoài", "Tùy CĐT thích"], correct: 1 },
  { id: 321, text: "HSMT có được đưa ra điều kiện 'đã từng thực hiện hợp đồng tại địa phương' không?", options: ["Có", "Không, đây là hành vi hạn chế nhà thầu", "Có nếu gói thầu nhỏ", "Có nếu UBND tỉnh yêu cầu"], correct: 1 },
  { id: 322, text: "Thời gian khóa chứng thư số của nhà thầu trên Hệ thống?", options: ["Tùy thầu chọn", "Do Hệ thống tự động quản lý", "Mỗi khi đóng thầu", "Vĩnh viễn"], correct: 1 },
  { id: 323, text: "Kết quả lựa chọn nhà thầu qua mạng được Hệ thống tự động gửi đến?", options: ["Địa chỉ email đã đăng ký của các nhà thầu tham dự", "Người dân", "Công an", "Chỉ nhà thầu trúng"], correct: 0 },
  { id: 324, text: "Gói thầu mua thuốc tập trung cấp quốc gia do đơn vị nào làm bên mời thầu?", options: ["Bệnh viện Bạch Mai", "Trung tâm Mua sắm tập trung thuốc Quốc gia (Bộ Y tế)", "Cục Quản lý Dược", "Sở Y tế"], correct: 1 },
  { id: 325, text: "Nhà thầu cung cấp hàng hóa phải bảo đảm?", options: ["Hàng mới 100%", "Đúng xuất xứ, thông số kỹ thuật", "Có bảo hành theo quy định", "Tất cả phương án trên"], correct: 3 },
  { id: 326, text: "Chi phí bảo đảm dự thầu bị tịch thu sẽ được?", options: ["Chủ đầu tư tiêu", "Nộp vào ngân sách nhà nước (hoặc theo quy định vốn dự án)", "Trả cho thầu hạng hai", "Thanh toán cho tổ chuyên gia"], correct: 1 },
  { id: 327, text: "Hồ sơ mời thầu (HSMT) quốc tế sử dụng ngôn ngữ nào?", options: ["Tiếng Việt", "Tiếng Anh", "Tiếng Việt và Tiếng Anh", "Tiếng Pháp"], correct: 2 },
  { id: 328, text: "Đối với gói thầu tư vấn, phương pháp đánh giá nào phổ biến nhất?", options: ["Giá thấp nhất", "Giá đánh giá", "Dựa trên kỹ thuật và giá (kết hợp)", "Chỉ định giá"], correct: 2 },
  { id: 329, text: "Thời hạn tối đa giải quyết kiến nghị tại CĐT?", options: ["07 ngày làm việc", "10 ngày", "15 ngày", "03 ngày"], correct: 0 },
  { id: 330, text: "Tổ chuyên gia có quyền thay đổi kết quả chấm thầu sau khi đã ký biên bản không?", options: ["Có, thoải mái", "Không, trừ khi có phát hiện sai sót và được CĐT cho phép làm lại", "Có nếu nhà thầu kiện", "Chỉ thầu chính được sửa"], correct: 1 },
  { id: 331, text: "Mua sắm tập trung giúp?", options: ["Giảm giá nhờ mua số lượng lớn", "Chuẩn hóa hàng hóa", "Tiết kiệm chi phí tổ chức thầu", "Tất cả phương án trên"], correct: 3 },
  { id: 332, text: "Gói thầu xây lắp nhà văn hóa 3 tỷ đồng áp dụng hình thức nào?", options: ["Đấu thầu rộng rãi", "Chào hàng cạnh tranh", "Chỉ định thầu (nếu thuộc trường hợp cấp bách)", "Cả A và B đều được"], correct: 3 },
  { id: 333, text: "Hợp đồng trọn gói có được tạm ứng không?", options: ["Không", "Có, theo thỏa thuận trong hợp đồng", "Chỉ thầu thân mới được", "Chỉ thầu nước ngoài"], correct: 1 },
  { id: 334, text: "Thời gian chuẩn bị HSDT cho gói thầu quy mô nhỏ?", options: ["Tối thiểu 10 ngày", "Tối thiểu 15 ngày", "Tối thiểu 20 ngày", "Tối thiểu 30 ngày"], correct: 0 },
  { id: 335, text: "Thông tin nào không được công khai trên Hệ thống mạng đấu thầu?", options: ["Giá dự thầu của các nhà thầu", "Danh sách thầu bị cấm", "Bí mật công nghệ trong HSDT của thầu", "Kết quả trúng thầu"], correct: 2 },
  { id: 336, text: "Hợp đồng EPC là gói thầu?", options: ["Chỉ xây lắp", "Thiết kế và Cung cấp thiết bị", "Thiết kế, Cung cấp thiết bị và Xây lắp", "Chỉ cung cấp nhân sự"], correct: 2 },
  { id: 337, text: "Cơ quan thẩm định kế hoạch lựa chọn nhà thầu dự án cấp Tỉnh?", options: ["Sở Kế hoạch và Đầu tư", "Sở Tài chính", "Văn phòng UBND", "Sở Xây dựng"], correct: 0 },
  { id: 338, text: "Ai phê duyệt kết quả lựa chọn nhà thầu?", options: ["Người có thẩm quyền", "Chủ đầu tư", "Bên mời thầu", "Tổ chuyên gia"], correct: 1 },
  { id: 339, text: "Khi nào hợp đồng có giá trị pháp lý?", options: ["Khi thầu nhận tiền", "Sau khi ký kết đúng quy định pháp luật", "Sau khi xong dự án", "Khi thầu nộp bảo lãnh"], correct: 1 },
  { id: 340, text: "Trường hợp nào được điều chỉnh kế hoạch lựa chọn nhà thầu?", options: ["Thay đổi nguồn vốn", "Thay đổi phạm vi dự án", "Thay đổi hình thức lựa chọn nhà thầu", "Tất cả phương án trên"], correct: 3 },
  { id: 341, text: "Đấu thầu hạn chế áp dụng khi có tối thiểu mấy nhà thầu?", options: ["02 nhà thầu", "03 nhà thầu", "05 nhà thầu", "10 nhà thầu"], correct: 1 },
  { id: 342, text: "Tư vấn giám sát phải độc lập với?", options: ["Chủ đầu tư", "Nhà thầu thi công xây lắp", "Người có thẩm quyền", "Người đi đường"], correct: 1 },
  { id: 343, text: "Mua sắm trực tiếp áp dụng khi gói thầu có tính chất?", options: ["Tương tự gói thầu đã thực hiện trước đó", "Hoàn toàn mới", "Giá rẻ hơn 50%", "Chỉ thầu ngoại mới làm được"], correct: 0 },
  { id: 344, text: "Giá dự thầu sau sửa lỗi là gì?", options: ["Giá thầu ban đầu", "Giá thầu sau khi đã được bên mời thầu kiểm tra và sửa các lỗi số học", "Giá trúng thầu", "Giá gói thầu"], correct: 1 },
  { id: 345, text: "Thẩm định kết quả lựa chọn nhà thầu nhằm?", options: ["Chấm lại thầu", "Kiểm tra tính tuân thủ pháp luật của quá trình xét thầu", "Giảm giá thầu", "Loại bớt nhà thầu"], correct: 1 },
  { id: 346, text: "Nhà thầu bị cấm thầu phạm vi toàn quốc do ai quyết định?", options: ["Bộ trưởng Bộ Kế hoạch và Đầu tư", "Thủ tướng Chính phủ", "Bộ trưởng các Bộ hoặc Chủ tịch UBND tỉnh", "Cả B và C"], correct: 2 },
  { id: 347, text: "Lựa chọn nhà thầu trong trường hợp đặc biệt áp dụng cho?", options: ["Gói thầu mua vũ khí, khí tài", "Gói thầu có yêu cầu bảo mật quốc gia", "Gói thầu mà các hình thức khác không áp dụng được", "Tất cả phương án trên"], correct: 3 },
  { id: 348, text: "Việc đánh giá HSDT phải hoàn thành trong bao lâu?", options: ["Tối đa 45 ngày (gói lớn 60 ngày)", "90 ngày", "10 ngày", "30 ngày"], correct: 0 },
  { id: 349, text: "Bảo lãnh dự thầu có được gia hạn không?", options: ["Không", "Có, khi thời gian lựa chọn nhà thầu kéo dài và thầu đồng ý", "Có, mặc định tự gia hạn", "Chỉ ngân hàng được quyền gia hạn"], correct: 1 },
  { id: 350, text: "Gói thầu cung cấp dịch vụ vệ sinh tòa nhà là?", options: ["Dịch vụ tư vấn", "Dịch vụ phi tư vấn", "Mua sắm hàng hóa", "Xây lắp"], correct: 1 },
  { id: 351, text: "Khi nào nhà thầu được thay đổi nhân sự chủ chốt?", options: ["Lúc nào cũng được", "Khi nhân sự đó bị ốm, tai nạn hoặc lý do bất khả kháng và được CĐT chấp thuận", "Khi thầu thấy người khác giỏi hơn", "Không bao giờ"], correct: 1 },
  { id: 352, text: "Hợp đồng đơn giá cố định thanh toán theo?", options: ["Khối lượng thực tế nghiệm thu nhân với đơn giá trong hợp đồng", "Giá trọn gói", "Giá thị trường lúc làm xong", "Tùy thầu đòi"], correct: 0 },
  { id: 353, text: " HSMT quy định tiêu chuẩn 'Đạt/Không đạt' thì nhà thầu bị loại khi?", options: ["Có 1 tiêu chuẩn không đạt", "Có 50% tiêu chuẩn không đạt", "Giá quá cao", "Thầu không đẹp trai"], correct: 0 },
  { id: 354, text: "Hủy thầu có làm mất hiệu lực của HSMT không?", options: ["Có", "Không", "Chỉ mất hiệu lực một phần", "Tùy thầu chọn"], correct: 0 },
  { id: 355, text: "Người có thẩm quyền giải quyết kiến nghị trong bao lâu?", options: ["05 ngày làm việc", "10 ngày", "15 ngày", "20 ngày"], correct: 0 },
  { id: 356, text: "Mục đích của việc đăng tải kế hoạch lựa chọn nhà thầu?", options: ["Để nhà thầu biết và chuẩn bị", "Để cơ quan chức năng giám sát", "Đảm bảo tính công khai minh bạch", "Tất cả phương án trên"], correct: 3 },
  { id: 357, text: "Trường hợp chỉ có 01 nhà thầu vượt qua bước kỹ thuật?", options: ["Hủy thầu", "Mở hồ sơ tài chính của nhà thầu đó để đánh giá", "Mời thêm thầu khác", "Chỉ định thầu luôn"], correct: 1 },

const LETTERS = ['A', 'B', 'C', 'D'];
let questions = []; 
let userAnswers = []; 
let currentQ = 0;
let timer;
let timeLeft = 60 * 60;

function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').innerText = t === 'light' ? '☀️ Sáng' : '🌙 Tối';
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function startNewQuiz() {
  if (masterBank.length === 0) return alert("Kho đề trống!");
  
  // Thuật toán bốc 70 câu ngầm
  let seenIds = JSON.parse(localStorage.getItem('quiz_seen_all') || '[]');
  let unseen = masterBank.filter(q => !seenIds.includes(q.id));
  if (unseen.length < 10) { seenIds = []; unseen = [...masterBank]; }

  let selectedRaw = shuffle([...unseen]).slice(0, 70);
  if (selectedRaw.length < 70) {
    let extra = shuffle(masterBank.filter(q => !selectedRaw.find(x => x.id === q.id))).slice(0, 70 - selectedRaw.length);
    selectedRaw = selectedRaw.concat(extra);
  }

  // Cập nhật câu hỏi và ĐẢO ĐÁP ÁN
  questions = selectedRaw.map(q => {
    const correctText = q.options[q.correct];
    const shuffledOpts = shuffle([...q.options]);
    return { ...q, options: shuffledOpts, correct: shuffledOpts.indexOf(correctText) };
  });

  localStorage.setItem('quiz_seen_all', JSON.stringify([...new Set([...seenIds, ...questions.map(q => q.id)])]));

  userAnswers = new Array(70).fill(null);
  currentQ = 0; timeLeft = 60 * 60;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-quiz').classList.add('active');
  renderQuestion();
  
  if(timer) clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    let m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timer-text').innerText = `${m}:${s<10?'0':''}${s}`;
    if(timeLeft <= 0) submitQuiz();
  }, 1000);
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-meta').innerText = `Câu ${currentQ + 1} / 70 (ID Gốc: ${q.id})`;
  document.getElementById('q-text').innerText = q.text;
  document.getElementById('prog-fill').style.width = `${((currentQ+1)/70)*100}%`;
  document.getElementById('options-wrap').innerHTML = q.options.map((opt, i) => `
    <div class="opt-btn ${userAnswers[currentQ] === i ? 'selected' : ''}" onclick="selectAns(${i})">
      <div class="opt-circle">${LETTERS[i]}</div><div style="font-size:14px">${opt}</div>
    </div>`).join('');
  document.getElementById('nav-dots').innerHTML = questions.map((_, i) => `
    <div class="nav-dot ${i===currentQ?'current':''} ${userAnswers[i]!==null?'answered':''}" onclick="currentQ=${i};renderQuestion()">${i+1}</div>`).join('');
}

function selectAns(i) { userAnswers[currentQ] = i; renderQuestion(); }
function navigate(d) { currentQ = Math.max(0, Math.min(69, currentQ + d)); renderQuestion(); }

function submitQuiz() {
  if(!confirm("Nộp bài?")) return;
  clearInterval(timer);
  let score = 0;
  questions.forEach((q, i) => { if(userAnswers[i] === q.correct) score++; });
  const pct = Math.round((score/70)*100);
  const statusEl = document.getElementById('result-status');
  statusEl.innerText = pct >= 50 ? "ĐÃ ĐỖ" : "CHƯA ĐẠT";
  statusEl.style.color = pct >= 50 ? "var(--green)" : "var(--red)";
  document.getElementById('res-pct').innerText = pct + '%';
  document.getElementById('res-correct').innerText = score;
  document.getElementById('res-wrong').innerText = 70 - score;
  
  document.getElementById('review-wrap').innerHTML = questions.map((q, i) => {
    const isCorrect = userAnswers[i] === q.correct;
    return `
      <div class="review-item" style="border-left-color: ${isCorrect?'var(--green)':'var(--red)'}">
        <div style="font-weight:600">${i+1}. ${q.text}</div>
        <div style="font-size:13px; margin-top:5px">
          <b style="color:${isCorrect?'var(--green)':'var(--red)'}">Bạn chọn:</b> ${userAnswers[i]!==null ? q.options[userAnswers[i]] : 'Bỏ trống'}<br>
          <b style="color:var(--green)">Đáp án đúng:</b> ${q.options[q.correct]}
        </div>
      </div>`;
  }).join('');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-result').classList.add('active');
}
</script>
