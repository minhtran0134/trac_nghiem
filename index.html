<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ôn Tập Luật Đấu Thầu 2023</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0d0f; --bg2:#131316; --bg3:#1a1a1f; --bg4:#222228;
  --border:#2a2a32; --border2:#38383f; --text:#f0f0f4; --text2:#9898a8; --text3:#5a5a68;
  --accent:#7c6fff; --accent2:#5b4ff0; --accent-glow:rgba(124,111,255,0.18);
  --green:#2dd98e; --green-bg:rgba(45,217,142,0.1);
  --red:#ff5f5f; --red-bg:rgba(255,95,95,0.1);
  --radius:14px; --radius-sm:10px;
}
[data-theme="light"] {
  --bg:#f4f4f9; --bg2:#ffffff; --bg3:#f0f0f5; --bg4:#e8e8f0;
  --border:#d1d1d6; --border2:#c7c7cc; --text:#1c1c1e; --text2:#636366; --text3:#8e8e93;
  --accent:#5856d6; --accent2:#4544b3; --accent-glow:rgba(88,86,214,0.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;transition:0.3s;}
.app{max-width:680px;margin:0 auto;padding:1.5rem 1rem}
.screen{display:none}.screen.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.display{font-family:'Syne',sans-serif;font-size:24px;font-weight:700}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);transition:0.2s}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.opt-btn{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;cursor:pointer;background:var(--bg3);transition:0.2s}
.opt-btn:hover{border-color:var(--text3)}
.opt-btn.selected{border-color:var(--accent);background:var(--accent-glow)}
.opt-circle{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700}
.prog-bar{height:4px;background:var(--bg4);border-radius:2px;margin:1rem 0;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);transition:width 0.3s}
.nav-dots{display:grid;grid-template-columns: repeat(auto-fill, minmax(35px, 1fr));gap:6px;margin-top:1.5rem}
.nav-dot{height:35px;border-radius:8px;border:1px solid var(--border);font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg2)}
.nav-dot.answered{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-dot.current{border:2px solid var(--accent);color:var(--accent);font-weight:700}
.review-item{padding:15px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);margin-bottom:12px;border-left:4px solid transparent}
</style>
</head>
<body>
<div class="app">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
    <div style="font-weight:700; color:var(--accent)">QUIZ APP</div>
    <button class="btn" onclick="toggleTheme()" id="theme-btn">🌙 Chế độ tối</button>
  </div>

  <div id="screen-home" class="screen active">
    <div class="card">
      <div class="display">Luật Đấu Thầu 2023</div>
      <p style="color:var(--text2); margin-top:8px">Hệ thống đã nạp đầy đủ 40 câu hỏi từ tài liệu của bạn.</p>
      <div style="margin-top:20px; display:flex; gap:15px; font-size:13px">
        <span>⏱ 90 Phút</span>
        <span>📝 40 Câu hỏi</span>
        <span>🎯 Vượt qua: 80%</span>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="startQuiz()">Bắt đầu làm bài</button>
  </div>

  <div id="screen-quiz" class="screen">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <span id="q-meta" style="font-size:13px; color:var(--text2)"></span>
        <span id="timer-text" style="font-weight:700; color:var(--accent)">90:00</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
      <div id="q-text" style="font-size:17px; font-weight:500; margin:1.5rem 0; min-height:60px"></div>
      <div id="options-wrap"></div>
      <div style="display:flex; gap:10px; margin-top:20px">
        <button class="btn" style="flex:1" onclick="navigate(-1)">Câu trước</button>
        <button class="btn btn-primary" style="flex:1" onclick="navigate(1)">Câu tiếp theo</button>
      </div>
      <div class="nav-dots" id="nav-dots"></div>
    </div>
    <button class="btn btn-primary" style="width:100%; background:var(--green); border-color:var(--green)" onclick="submitQuiz()">Nộp bài thi</button>
  </div>

  <div id="screen-result" class="screen">
    <div class="card" style="text-align:center">
      <div style="font-size:14px; color:var(--text2)">KẾT QUẢ CỦA BẠN</div>
      <div class="display" id="res-pct" style="font-size:48px; margin:10px 0; color:var(--accent)">0%</div>
      <div id="res-stats" style="display:flex; justify-content:center; gap:20px; font-weight:500">
        <span style="color:var(--green)">Đúng: <span id="res-correct"></span></span>
        <span style="color:var(--red)">Sai: <span id="res-wrong"></span></span>
      </div>
    </div>
    <div id="review-wrap"></div>
    <button class="btn btn-primary" style="width:100%" onclick="location.reload()">Làm bài lại</button>
  </div>
</div>

<script>
const LETTERS = ['A', 'B', 'C', 'D'];
const questions = [
  { text: "Trong đấu thầu quốc tế, quy định về đồng tiền dự thầu như thế nào?", options: ["Hồ sơ mời thầu có thể quy định tối đa 03 loại tiền tệ, nếu có Đồng Việt Nam thì khi đánh giá hồ sơ phải quy đổi về Đồng Việt Nam", "Nhà thầu không được chào thầu bằng đồng tiền nước ngoài", "Chi phí trong nước và chi phí ở nước ngoài đều phải chào thầu bằng Đồng Việt Nam", "Nhà thầu chỉ được chào thầu bằng 01 loại tiền tệ bất kỳ"], correct: 0 },
  { text: "Đơn vị sự nghiệp công lập tự bảo đảm một phần chi thường xuyên có thể tự quyết định lựa chọn nhà thầu trong trường hợp nào?", options: ["Lựa chọn nhà thầu khi không sử dụng vốn ngân sách nhà nước mà sử dụng nguồn thu hợp pháp của đơn vị", "Gói thầu của đơn vị sự nghiệp công lập sử dụng nguồn vốn vay, trừ vốn tín dụng đầu tư của nhà nước, vốn vay lại từ vốn ODA, vốn vay ưu đãi nước ngoài", "Lựa chọn nhà thầu Gói thầu thuộc dự án đầu tư sử dụng nguồn vốn ngân sách nhà nước", "Khi nhận tài trợ từ tổ chức quốc tế mà tổ chức đó yêu cầu không thực hiện theo Luật Đấu thầu"], correct: 0 },
  { text: "Trong đấu thầu, quy định về ngôn ngữ sử dụng như thế nào?", options: ["Đấu thầu quốc tế chỉ sử dụng tiếng Anh, không được sử dụng tiếng Việt", "Nhà thầu, trong đấu thầu quốc tế bắt buộc phải sử dụng cả tiếng Việt và tiếng Anh khi tham dự thầu", "Đấu thầu trong nước sử dụng tiếng Anh, đấu thầu quốc tế sử dụng tiếng Việt", "Đấu thầu trong nước sử dụng tiếng Việt, đấu thầu quốc tế sử dụng tiếng Anh hoặc tiếng Việt và tiếng Anh"], correct: 3 },
  { text: "Cơ quan, tổ chức, doanh nghiệp được tự quyết định lựa chọn nhà thầu phải bảo đảm?", options: ["Công khai, minh bạch, hiệu quả kinh tế và trách nhiệm giải trình", "Tiết kiệm, hiệu quả và trách nhiệm giải trình", "Công khai, minh bạch, hiệu quả và trách nhiệm giải trình", "Cạnh tranh, công bằng, minh bạch, hiệu quả kinh tế và trách nhiệm giải trình"], correct: 2 },
  { text: "Dịch vụ phi tư vấn bao gồm nội dung nào?", options: ["Cung cấp thiết bị có bao gồm dịch vụ lắp đặt", "Logistics, bảo hiểm, quảng cáo, vệ sinh", "Khảo sát, thiết kế, lập báo cáo nghiên cứu khả thi", "Xây dựng phần mềm nội bộ"], correct: 1 },
  { text: "Khi nhà thầu vi phạm quy định về đấu thầu, nhà thầu có thể phải chịu hình thức xử lý vi phạm gì?", options: ["Tất cả đáp án trên đều đúng", "Cấm tham dự thầu trong một khoảng thời gian tùy theo mức độ vi phạm", "Xử lý hình sự tùy thuộc vào mức độ vi phạm và hậu quả", "Xử phạt hành chính tương ứng với từng hành vi vi phạm"], correct: 0 },
  { text: "Việc lựa chọn nhà thầu để ký kết hợp đồng dầu khí được thực hiện theo quy định của pháp luật nào?", options: ["Luật Đấu thầu", "Do người có thẩm quyền quyết định", "Luật Dầu khí", "Luật Doanh nghiệp"], correct: 2 },
  { text: "Trách nhiệm của chủ đầu tư?", options: ["Tất cả đáp án trên đều đúng", "Ký kết hợp đồng với nhà thầu", "Phê duyệt kết quả lựa chọn nhà thầu", "Phê duyệt kế hoạch lựa chọn nhà thầu"], correct: 0 },
  { text: "Hồ sơ mời thầu là gì?", options: ["Tài liệu dành riêng cho đấu thầu quốc tế", "Tài liệu sử dụng cho mua sắm trực tiếp, chỉ định thầu", "Tài liệu sử dụng cho đấu thầu rộng rãi, đấu thầu hạn chế, chào hàng cạnh tranh", "Tất cả các đáp án trên đều đúng"], correct: 2 },
  { text: "Dịch vụ tư vấn bao gồm nội dung nào sau đây?", options: ["Khảo sát, lập thiết kế, tư vấn đấu thầu, kiểm toán", "Dịch vụ bảo hiểm, truyền thông, vệ sinh", "Dịch vụ bảo trì, bảo dưỡng thiết bị", "Dịch vụ cung cấp phần mềm thương mại"], correct: 0 },
  { text: "Hành vi nào được xem là thông thầu?", options: ["Dàn xếp, thỏa thuận, ép buộc để một hoặc các bên chuẩn bị hồ sơ dự thầu hoặc rút hồ sơ dự thầu để một bên trúng thầu", "Cung cấp thông tin sai lệch trong hồ sơ dự thầu để giành lợi thế cạnh tranh", "Nhà thầu tư vấn giám sát đồng thời thực hiện tư vấn kiểm định đối với gói thầu do nhà thầu đó giám sát", "Cố tình khiếu nại, tố cáo, kiến nghị sai sự thật để cản trở hoạt động đấu thầu"], correct: 0 },
  { text: "Hoạt động lựa chọn nhà thầu nào dưới đây thuộc đối tượng áp dụng của Luật Đấu thầu?", options: ["Gói thầu mua nguyên liệu, nhiên liệu để phục vụ cho hoạt động sản xuất kinh doanh của doanh nghiệp nhà nước", "Tất cả đáp án trên đều đúng", "Gói thầu mua sắm thiết bị văn phòng tại các cơ quan nhà nước", "Gói thầu thuộc dự án đầu tư của đơn vị sự nghiệp công lập tự bảo đảm chi thường xuyên"], correct: 1 },
  { text: "Thành viên tổ chuyên gia hoặc tổ thẩm định phải có tối thiểu bao nhiêu năm công tác?", options: ["01 năm", "02 năm", "03 năm", "05 năm"], correct: 2 },
  { text: "Trách nhiệm của người có thẩm quyền trong đấu thầu bao gồm?", options: ["Đình chỉ cuộc thầu và không công nhận kết quả", "Ký hợp đồng với nhà thầu", "Phê duyệt kế hoạch lựa chọn nhà thầu", "Quyết định xử lý tình huống"], correct: 2 },
  { text: "Nhà thầu phụ đặc biệt là gì?", options: ["Nhà thầu phụ cùng ký kết hợp đồng với chủ đầu tư", "Nhà thầu phụ có thể thay thế nhà thầu chính", "Nhà thầu phụ thực hiện công việc quan trọng của gói thầu", "Nhà thầu đảm nhiệm phần công việc quan trọng trong liên danh"], correct: 2 },
  { text: "Hồ sơ yêu cầu dùng cho hình thức nào?", options: ["Mua sắm trực tiếp", "Đấu thầu rộng rãi", "Đấu thầu hạn chế", "Chào hàng cạnh tranh"], correct: 0 },
  { text: "Nhà thầu tham dự thầu phải độc lập về pháp lý và tài chính với bên nào?", options: ["Nhà thầu tư vấn lập, thẩm định hồ sơ mời thầu", "Nhà thầu tư vấn đánh giá hồ sơ dự thầu", "Cả A, B và D đều đúng", "Các nhà thầu khác cùng tham dự đấu thầu hạn chế"], correct: 2 },
  { text: "Dự toán mua sắm là gì?", options: ["Tất cả các đáp án trên đều đúng", "Là dự toán các chi phí được chủ đầu tư phê duyệt mỗi năm", "Là dự kiến nguồn kinh phí để mua sắm trong phạm vi ngân sách hoặc nguồn hợp pháp", "Là nguồn vốn ngân sách nhà nước được cấp hàng năm"], correct: 2 },
  { text: "Trách nhiệm của tổ chuyên gia?", options: ["Bảo mật thông tin, tài liệu liên quan", "Lập hồ sơ mời thầu, hồ sơ yêu cầu", "Đánh giá hồ sơ dự thầu, hồ sơ đề xuất", "Tất cả đáp án trên đều đúng"], correct: 3 },
  { text: "Giá đề nghị trúng thầu là gì?", options: ["Giá dự thầu sau khi sửa lỗi, hiệu chỉnh sai lệch và giảm giá", "Giá của nhà thầu xếp hạng thứ nhất", "Giá ký hợp đồng", "Giá thấp nhất trong các hồ sơ"], correct: 0 },
  { text: "Phương thức một giai đoạn một túi hồ sơ áp dụng cho hình thức nào?", options: ["Đấu thầu rộng rãi, đấu thầu hạn chế quy mô nhỏ", "Chào hàng cạnh tranh", "Mua sắm trực tiếp, chỉ định thầu", "Tất cả các đáp án trên"], correct: 3 },
  { text: "Hợp đồng trọn gói áp dụng cho gói thầu nào?", options: ["Gói thầu xây lắp quy mô nhỏ", "Gói thầu cung cấp dịch vụ tư vấn đơn giản", "Gói thầu mua sắm hàng hóa thông dụng", "Tất cả các đáp án trên"], correct: 3 },
  { text: "Thời gian chuẩn bị hồ sơ dự thầu tối thiểu đối với đấu thầu trong nước là bao nhiêu ngày?", options: ["10 ngày", "15 ngày", "20 ngày", "30 ngày"], correct: 1 },
  { text: "Thời gian đánh giá hồ sơ dự thầu tối đa là bao nhiêu ngày?", options: ["25 ngày", "30 ngày", "45 ngày", "60 ngày"], correct: 2 },
  { text: "Bảo đảm dự thầu không áp dụng cho hình thức nào?", options: ["Đấu thầu rộng rãi", "Đấu thầu hạn chế", "Chỉ định thầu", "Chào hàng cạnh tranh"], correct: 2 },
  { text: "Giá trị bảo đảm dự thầu trong khoảng nào?", options: ["1% đến 1.5% giá gói thầu", "1% đến 3% giá gói thầu", "2% đến 5% giá gói thầu", "3% đến 10% giá gói thầu"], correct: 1 },
  { text: "Trường hợp nào nhà thầu không được hoàn trả bảo đảm dự thầu?", options: ["Rút hồ sơ dự thầu sau thời điểm đóng thầu", "Vi phạm pháp luật về đấu thầu dẫn đến bị hủy thầu", "Không tiến hành đối chiếu tài liệu hoặc không ký hợp đồng", "Tất cả các đáp án trên"], correct: 3 },
  { text: "Ưu đãi trong lựa chọn nhà thầu áp dụng cho đối tượng nào?", options: ["Hàng hóa có xuất xứ Việt Nam", "Nhà thầu là doanh nghiệp siêu nhỏ, doanh nghiệp nhỏ", "Nhà thầu có sử dụng nhiều lao động là nữ hoặc người khuyết tật", "Tất cả các đáp án trên"], correct: 3 },
  { text: "Quy trình lựa chọn nhà thầu gồm mấy bước cơ bản?", options: ["4 bước", "5 bước", "6 bước", "7 bước"], correct: 2 },
  { text: "Hồ sơ mời thầu được phát hành khi nào?", options: ["Sau khi phê duyệt kế hoạch lựa chọn nhà thầu", "Sau khi thông báo mời thầu", "Ngay sau khi có quyết định đầu tư", "Tất cả đều sai"], correct: 1 },
  { text: "Bên mời thầu là đơn vị nào?", options: ["Chủ đầu tư", "Tổ chức chuyên môn được chủ đầu tư thuê", "Cơ quan phê duyệt dự án", "Cả A và B đều đúng"], correct: 3 },
  { text: "Tiêu chuẩn đánh giá hồ sơ dự thầu bao gồm?", options: ["Đánh giá về năng lực, kinh nghiệm", "Đánh giá về kỹ thuật", "Đánh giá về giá hoặc tổng hợp", "Tất cả các đáp án trên"], correct: 3 },
  { text: "Hình thức Chào hàng cạnh tranh áp dụng cho gói thầu có giá trị bao nhiêu?", options: ["Dưới 1 tỷ đồng", "Dưới 5 tỷ đồng", "Dưới 10 tỷ đồng", "Không quy định giá trị"], correct: 1 },
  { text: "Mua sắm trực tiếp được áp dụng khi nào?", options: ["Nhà thầu đã trúng thầu trước đó trong vòng 12 tháng", "Gói thầu có nội dung tương tự", "Giá gói thầu không quá giá trong hợp đồng đã ký", "Tất cả các đáp án trên"], correct: 3 },
  { text: "Chỉ định thầu được áp dụng trong trường hợp khẩn cấp nào?", options: ["Thiên tai, dịch bệnh", "Sự cố cần khắc phục ngay", "Gói thầu bí mật nhà nước", "Tất cả các đáp án trên"], correct: 3 },
  { text: "Hình thức tự thực hiện áp dụng khi nào?", options: ["Chủ đầu tư có đủ năng lực thực hiện", "Gói thầu thuộc dự án do mình quản lý", "Đảm bảo hiệu quả hơn thuê nhà thầu ngoài", "Tất cả các đáp án trên"], correct: 3 },
  { text: "Chủ đầu tư là?", options: ["Cơ quan, tổ chức sở hữu hoặc quản lý vốn để thực hiện dự án", "Cơ quan phê duyệt kế hoạch lựa chọn nhà thầu", "Cơ quan đình chỉ cuộc thầu", "Đơn vị quyết định đầu tư"], correct: 0 },
  { text: "Hoạt động lựa chọn nhà thầu nào không bắt buộc áp dụng Luật Đấu thầu?", options: ["Gói thầu xây trụ sở DN nhà nước không dùng ngân sách", "Gói thầu dịch vụ công dùng ngân sách", "Gói thầu mua sắm dùng ngân sách", "Gói thầu dùng nguồn thu hợp pháp của đơn vị sự nghiệp tự bảo đảm một phần chi thường xuyên"], correct: 3 },
  { text: "Nhà thầu phụ là gì?", options: ["Nhà thầu liên danh", "Tổ chức ký hợp đồng với nhà thầu chính để thực hiện một phần công việc", "Nhà thầu cung cấp vật tư", "Nhà thầu thực hiện trên 50% gói thầu"], correct: 1 },
  { text: "Dự án đầu tư bao gồm nội dung nào sau đây?", options: ["Chương trình theo quy định", "Nhiệm vụ quy hoạch", "Dự án theo quy định", "Tất cả các phương án trên"], correct: 3 }
];

let userAnswers = new Array(questions.length).fill(null);
let currentQ = 0;
let timer;
let timeLeft = 90 * 60;

function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').innerText = t === 'light' ? '🌙 Chế độ tối' : '☀️ Chế độ sáng';
}

function startQuiz() {
  showScreen('screen-quiz');
  renderQuestion();
  timer = setInterval(() => {
    timeLeft--;
    let m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timer-text').innerText = `${m}:${s<10?'0':''}${s}`;
    if(timeLeft <= 0) submitQuiz();
  }, 1000);
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-meta').innerText = `Câu hỏi ${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-text').innerText = q.text;
  document.getElementById('prog-fill').style.width = `${((currentQ+1)/questions.length)*100}%`;
  
  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = q.options.map((opt, i) => `
    <div class="opt-btn ${userAnswers[currentQ] === i ? 'selected' : ''}" onclick="selectAns(${i})">
      <div class="opt-circle">${LETTERS[i]}</div>
      <div style="font-size:14.5px">${opt}</div>
    </div>
  `).join('');
  renderNav();
}

function selectAns(i) { userAnswers[currentQ] = i; renderQuestion(); }
function navigate(d) { currentQ = Math.max(0, Math.min(questions.length-1, currentQ + d)); renderQuestion(); }

function renderNav() {
  document.getElementById('nav-dots').innerHTML = questions.map((_, i) => `
    <div class="nav-dot ${i===currentQ?'current':''} ${userAnswers[i]!==null?'answered':''}" onclick="currentQ=${i};renderQuestion()">${i+1}</div>
  `).join('');
}

function submitQuiz() {
  if(!confirm("Bạn có chắc chắn muốn nộp bài?")) return;
  clearInterval(timer);
  let correct = 0;
  questions.forEach((q, i) => { if(userAnswers[i] === q.correct) correct++; });
  
  const pct = Math.round((correct/questions.length)*100);
  document.getElementById('res-pct').innerText = pct + '%';
  document.getElementById('res-correct').innerText = correct;
  document.getElementById('res-wrong').innerText = questions.length - correct;
  
  document.getElementById('review-wrap').innerHTML = questions.map((q, i) => {
    const isCorrect = userAnswers[i] === q.correct;
    return `
      <div class="review-item" style="border-left-color: ${isCorrect?'var(--green)':'var(--red)'}">
        <div style="font-weight:600; font-size:14px; margin-bottom:8px">${i+1}. ${q.text}</div>
        <div style="font-size:13px">
          <div style="color:var(--text2)">Bạn chọn: <span style="color:${isCorrect?'var(--green)':'var(--red)'}">${userAnswers[i]!==null ? LETTERS[userAnswers[i]] + '. ' + q.options[userAnswers[i]] : 'Chưa trả lời'}</span></div>
          ${!isCorrect ? `<div style="color:var(--green); margin-top:4px">Đáp án đúng: ${LETTERS[q.correct]}. ${q.options[q.correct]}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
  showScreen('screen-result');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
